<svg viewBox="0 0 900 440" xmlns="http://www.w3.org/2000/svg" font-family="Inter, Roboto, sans-serif">
  <!-- Background -->
  <rect width="900" height="440" fill="#1a1a2e"/>

  <!-- Title -->
  <text x="450" y="36" text-anchor="middle" font-size="18" font-weight="bold" fill="#ffffff">OKRs y Métricas de Valor</text>
  <text x="450" y="54" text-anchor="middle" font-size="11" fill="#8892b0">De la estrategia al Sprint: Output → Outcome → Impact</text>

  <!-- ===== OKR Structure column ===== -->
  <rect x="30" y="74" width="260" height="220" rx="10" fill="#16213e" stroke="#0052CC" stroke-width="1.5"/>
  <text x="160" y="96" text-anchor="middle" font-size="13" font-weight="bold" fill="#0052CC">Estructura OKR</text>

  <!-- Objective box -->
  <rect x="50" y="108" width="220" height="40" rx="6" fill="#0052CC"/>
  <text x="160" y="124" text-anchor="middle" font-size="11" font-weight="bold" fill="#ffffff">Objective</text>
  <text x="160" y="140" text-anchor="middle" font-size="10" fill="#cce0ff">Cualitativo · Inspirador · ¿A dónde vamos?</text>

  <!-- KR rows -->
  <rect x="50" y="158" width="220" height="30" rx="5" fill="#0d1b40" stroke="#4a9eff" stroke-width="1"/>
  <text x="160" y="173" text-anchor="middle" font-size="10" fill="#4a9eff" font-weight="bold">KR 1</text>
  <text x="160" y="184" text-anchor="middle" font-size="9" fill="#8892b0">baseline → target · fecha</text>

  <rect x="50" y="192" width="220" height="30" rx="5" fill="#0d1b40" stroke="#4a9eff" stroke-width="1"/>
  <text x="160" y="207" text-anchor="middle" font-size="10" fill="#4a9eff" font-weight="bold">KR 2</text>
  <text x="160" y="218" text-anchor="middle" font-size="9" fill="#8892b0">baseline → target · fecha</text>

  <rect x="50" y="226" width="220" height="30" rx="5" fill="#0d1b40" stroke="#4a9eff" stroke-width="1"/>
  <text x="160" y="241" text-anchor="middle" font-size="10" fill="#4a9eff" font-weight="bold">KR 3</text>
  <text x="160" y="252" text-anchor="middle" font-size="9" fill="#8892b0">baseline → target · fecha</text>

  <!-- OKR Cycle label -->
  <text x="160" y="278" text-anchor="middle" font-size="10" fill="#8892b0">Ciclo trimestral (Q)</text>
  <text x="160" y="290" text-anchor="middle" font-size="10" fill="#8892b0">70% cumplimiento = éxito</text>

  <!-- ===== Output/Outcome/Impact pyramid ===== -->
  <rect x="320" y="74" width="260" height="220" rx="10" fill="#16213e" stroke="#36B37E" stroke-width="1.5"/>
  <text x="450" y="96" text-anchor="middle" font-size="13" font-weight="bold" fill="#36B37E">Niveles de Medición</text>

  <!-- Impact (top) -->
  <rect x="370" y="108" width="160" height="38" rx="6" fill="#36B37E"/>
  <text x="450" y="123" text-anchor="middle" font-size="11" font-weight="bold" fill="#16213e">IMPACT</text>
  <text x="450" y="138" text-anchor="middle" font-size="9" fill="#16213e">Beneficio de negocio a largo plazo</text>

  <!-- Outcome (middle) -->
  <rect x="350" y="154" width="200" height="44" rx="6" fill="#0052CC"/>
  <text x="450" y="170" text-anchor="middle" font-size="11" font-weight="bold" fill="#ffffff">OUTCOME</text>
  <text x="450" y="184" text-anchor="middle" font-size="9" fill="#cce0ff">Cambio de comportamiento del usuario</text>
  <text x="450" y="196" text-anchor="middle" font-size="9" fill="#cce0ff">→ Medir con métricas del usuario</text>

  <!-- Output (base) -->
  <rect x="335" y="206" width="230" height="44" rx="6" fill="#16213e" stroke="#4a9eff" stroke-width="1.5"/>
  <text x="450" y="222" text-anchor="middle" font-size="11" font-weight="bold" fill="#4a9eff">OUTPUT</text>
  <text x="450" y="236" text-anchor="middle" font-size="9" fill="#8892b0">Lo que el equipo entrega</text>
  <text x="450" y="248" text-anchor="middle" font-size="9" fill="#8892b0">Features · Historias · Releases</text>

  <!-- Warning: feature factory -->
  <rect x="335" y="258" width="230" height="28" rx="5" fill="#0d1b40" stroke="#FF8B00" stroke-width="1"/>
  <text x="450" y="270" text-anchor="middle" font-size="10" fill="#FF8B00">⚠ "Feature factory":</text>
  <text x="450" y="282" text-anchor="middle" font-size="10" fill="#8892b0">solo output, cero outcome</text>

  <!-- ===== OKR vs KPI ===== -->
  <rect x="610" y="74" width="260" height="220" rx="10" fill="#16213e" stroke="#FF8B00" stroke-width="1.5"/>
  <text x="740" y="96" text-anchor="middle" font-size="13" font-weight="bold" fill="#FF8B00">OKR vs KPI</text>

  <!-- Headers -->
  <text x="680" y="116" text-anchor="middle" font-size="11" font-weight="bold" fill="#0052CC">OKR</text>
  <text x="810" y="116" text-anchor="middle" font-size="11" font-weight="bold" fill="#FF8B00">KPI</text>
  <line x1="620" y1="120" x2="860" y2="120" stroke="#4a5568" stroke-width="0.5"/>
  <line x1="740" y1="108" x2="740" y2="284" stroke="#4a5568" stroke-width="0.5"/>

  <text x="617" y="136" font-size="10" fill="#8892b0">Propósito</text>
  <text x="650" y="148" text-anchor="middle" font-size="9" fill="#4a9eff">¿A dónde ir?</text>
  <text x="800" y="148" text-anchor="middle" font-size="9" fill="#FF8B00">Estado actual</text>

  <text x="617" y="164" font-size="10" fill="#8892b0">Ciclo</text>
  <text x="650" y="176" text-anchor="middle" font-size="9" fill="#4a9eff">Trimestral</text>
  <text x="800" y="176" text-anchor="middle" font-size="9" fill="#FF8B00">Continuo</text>

  <text x="617" y="192" font-size="10" fill="#8892b0">Meta</text>
  <text x="650" y="204" text-anchor="middle" font-size="9" fill="#4a9eff">Stretch 70%</text>
  <text x="800" y="204" text-anchor="middle" font-size="9" fill="#FF8B00">100% target</text>

  <text x="617" y="220" font-size="10" fill="#8892b0">Foco</text>
  <text x="650" y="232" text-anchor="middle" font-size="9" fill="#4a9eff">Mejora</text>
  <text x="800" y="232" text-anchor="middle" font-size="9" fill="#FF8B00">Estabilidad</text>

  <!-- Complementary note -->
  <rect x="620" y="248" width="230" height="36" rx="5" fill="#0d1b40" stroke="#36B37E" stroke-width="1"/>
  <text x="735" y="261" text-anchor="middle" font-size="10" fill="#36B37E">KPIs y OKRs son</text>
  <text x="735" y="275" text-anchor="middle" font-size="10" fill="#8892b0">complementarios, no opuestos</text>

  <!-- ===== Bottom: connection to Sprint ===== -->
  <rect x="30" y="314" width="840" height="90" rx="10" fill="#16213e" stroke="#4a5568" stroke-width="1"/>
  <text x="450" y="334" text-anchor="middle" font-size="13" font-weight="bold" fill="#ffffff">Conexión OKR → Sprint</text>

  <!-- Org OKR -->
  <rect x="50" y="346" width="160" height="44" rx="6" fill="#0d1b40" stroke="#0052CC" stroke-width="1.5"/>
  <text x="130" y="362" text-anchor="middle" font-size="10" font-weight="bold" fill="#0052CC">OKR Organización</text>
  <text x="130" y="378" text-anchor="middle" font-size="9" fill="#8892b0">Visión estratégica anual</text>

  <line x1="210" y1="368" x2="250" y2="368" stroke="#4a5568" stroke-width="1.5" marker-end="url(#arrowFl)"/>
  <defs><marker id="arrowFl" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto"><path d="M0,0 L0,6 L7,3 z" fill="#4a5568"/></marker></defs>

  <!-- Team OKR -->
  <rect x="250" y="346" width="160" height="44" rx="6" fill="#0d1b40" stroke="#36B37E" stroke-width="1.5"/>
  <text x="330" y="362" text-anchor="middle" font-size="10" font-weight="bold" fill="#36B37E">OKR Equipo</text>
  <text x="330" y="378" text-anchor="middle" font-size="9" fill="#8892b0">Trimestral, alineado</text>

  <line x1="410" y1="368" x2="450" y2="368" stroke="#4a5568" stroke-width="1.5" marker-end="url(#arrowFl2)"/>
  <defs><marker id="arrowFl2" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto"><path d="M0,0 L0,6 L7,3 z" fill="#4a5568"/></marker></defs>

  <!-- Sprint Goal -->
  <rect x="450" y="346" width="160" height="44" rx="6" fill="#0d1b40" stroke="#FF8B00" stroke-width="1.5"/>
  <text x="530" y="362" text-anchor="middle" font-size="10" font-weight="bold" fill="#FF8B00">Sprint Goal</text>
  <text x="530" y="378" text-anchor="middle" font-size="9" fill="#8892b0">Contribuye al KR activo</text>

  <line x1="610" y1="368" x2="650" y2="368" stroke="#4a5568" stroke-width="1.5" marker-end="url(#arrowFl3)"/>
  <defs><marker id="arrowFl3" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto"><path d="M0,0 L0,6 L7,3 z" fill="#4a5568"/></marker></defs>

  <!-- Backlog -->
  <rect x="650" y="346" width="200" height="44" rx="6" fill="#0d1b40" stroke="#4a9eff" stroke-width="1.5"/>
  <text x="750" y="362" text-anchor="middle" font-size="10" font-weight="bold" fill="#4a9eff">Product Backlog</text>
  <text x="750" y="378" text-anchor="middle" font-size="9" fill="#8892b0">Historias priorizadas por OKR</text>

  <!-- Footer -->
  <text x="450" y="425" text-anchor="middle" font-size="10" fill="#4a5568">Semana 20 — Etapa 2: OKRs y Métricas de Valor</text>
</svg>
