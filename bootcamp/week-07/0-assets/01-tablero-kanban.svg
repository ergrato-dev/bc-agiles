  <!-- Backlog cards -->
  <rect x="28" y="112" width="124" height="28" rx="5" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="90" y="130" fill="#94a3b8" font-size="10" text-anchor="middle">US-012: Notificaciones</text>
  <rect x="28" y="146" width="124" height="28" rx="5" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="90" y="164" fill="#94a3b8" font-size="10" text-anchor="middle">US-013: Exportar CSV</text>
  <rect x="28" y="180" width="124" height="28" rx="5" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="90" y="198" fill="#94a3b8" font-size="10" text-anchor="middle">US-014: Dashboard</text>
  <text x="90" y="230" fill="#475569" font-size="10" text-anchor="middle">+ 8 más...</text>

  <!-- Análisis cards (WIP OK: 2/2) -->
  <rect x="178" y="112" width="134" height="28" rx="5" fill="#1e3a5f" stroke="#0052CC" stroke-width="1"/>
  <text x="245" y="130" fill="#93c5fd" font-size="10" text-anchor="middle">US-009: Filtros avanzados</text>
  <rect x="178" y="146" width="134" height="28" rx="5" fill="#1e3a5f" stroke="#0052CC" stroke-width="1"/>
  <text x="245" y="164" fill="#93c5fd" font-size="10" text-anchor="middle">US-010: Perfil de usuario</text>

  <!-- Desarrollo cards (WIP OK: 3/3) -->
  <rect x="338" y="112" width="164" height="28" rx="5" fill="#1e3a5f" stroke="#0052CC" stroke-width="1"/>
  <text x="420" y="130" fill="#93c5fd" font-size="10" text-anchor="middle">US-007: Login SSO</text>
  <rect x="338" y="146" width="164" height="28" rx="5" fill="#1e3a5f" stroke="#0052CC" stroke-width="1"/>
  <text x="420" y="164" fill="#93c5fd" font-size="10" text-anchor="middle">US-008: Roles y permisos</text>
  <rect x="338" y="180" width="164" height="28" rx="5" fill="#1e3a5f" stroke="#0052CC" stroke-width="1"/>
  <text x="420" y="198" fill="#93c5fd" font-size="10" text-anchor="middle">US-011: API pública</text>

  <!-- REVISIÓN cards — WIP violado (4 ítems, límite 2) -->
  <rect x="528" y="112" width="134" height="28" rx="5" fill="#3d1a00" stroke="#FF8B00" stroke-width="1.5"/>
  <text x="595" y="130" fill="#FB923C" font-size="10" text-anchor="middle">US-001: Auth básica</text>
  <rect x="528" y="146" width="134" height="28" rx="5" fill="#3d1a00" stroke="#FF8B00" stroke-width="1.5"/>
  <text x="595" y="164" fill="#FB923C" font-size="10" text-anchor="middle">US-002: Registro</text>
  <rect x="528" y="180" width="134" height="28" rx="5" fill="#3d1a00" stroke="#FF8B00" stroke-width="1.5"/>
  <text x="595" y="198" fill="#FB923C" font-size="10" text-anchor="middle">US-003: Reset password</text>
  <rect x="528" y="214" width="134" height="28" rx="5" fill="#3d1a00" stroke="#FF8B00" stroke-width="1.5"/>
  <text x="595" y="232" fill="#FB923C" font-size="10" text-anchor="middle">US-005: Session timeout</text>
  <text x="595" y="260" fill="#FF8B00" font-size="9" text-anchor="middle">⚠ 4/2 WIP violado</text>

  <!-- Staging cards (1/2) -->
  <rect x="688" y="112" width="114" height="28" rx="5" fill="#1e3a5f" stroke="#0052CC" stroke-width="1"/>
  <text x="745" y="130" fill="#93c5fd" font-size="10" text-anchor="middle">US-004: Onboarding</text>

  <!-- Done cards -->
  <rect x="828" y="112" width="104" height="28" rx="5" fill="#0f2a1a" stroke="#36B37E" stroke-width="1"/>
  <text x="880" y="130" fill="#4ade80" font-size="10" text-anchor="middle">US-006: Landing ✓</text>
  <rect x="828" y="146" width="104" height="28" rx="5" fill="#0f2a1a" stroke="#36B37E" stroke-width="1"/>
  <text x="880" y="164" fill="#4ade80" font-size="10" text-anchor="middle">US-000: Setup ✓</text>

  <!-- Metrics row -->
  <rect x="20" y="420" width="400" height="60" rx="8" fill="#16213e" stroke="#0052CC" stroke-width="1"/>
  <text x="220" y="442" fill="#93c5fd" font-size="12" font-weight="bold" text-anchor="middle">Métricas del Flujo</text>
  <text x="50" y="462" fill="#94a3b8" font-size="11">Lead Time promedio: 8 días</text>
  <text x="50" y="476" fill="#94a3b8" font-size="11">Cycle Time promedio: 5 días</text>
  <text x="230" y="462" fill="#94a3b8" font-size="11">Throughput: 2 ítems/semana</text>
  <text x="230" y="476" fill="#FF8B00" font-size="11">Revisión: 6 días prom. ← bottleneck</text>

  <!-- Legend -->
  <rect x="430" y="420" width="510" height="60" rx="8" fill="#16213e" stroke="#334155" stroke-width="1"/>
  <text x="685" y="442" fill="#94a3b8" font-size="11" font-weight="bold" text-anchor="middle">Leyenda</text>
  <rect x="445" y="452" width="12" height="12" rx="2" fill="#0052CC" fill-opacity="0.5"/>
  <text x="462" y="462" fill="#93c5fd" font-size="10">WIP OK</text>
  <rect x="515" y="452" width="12" height="12" rx="2" fill="#FF8B00" fill-opacity="0.5"/>
  <text x="532" y="462" fill="#FB923C" font-size="10">WIP violado</text>
  <rect x="615" y="452" width="12" height="12" rx="2" fill="#36B37E" fill-opacity="0.4"/>
  <text x="632" y="462" fill="#4ade80" font-size="10">Done</text>
  <text x="690" y="462" fill="#64748b" font-size="10">Cuello de botella: columna con más ítems que su WIP limit</text>
</svg>
