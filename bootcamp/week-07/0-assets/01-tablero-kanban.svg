<svg viewBox="0 0 960 500" xmlns="http://www.w3.org/2000/svg" font-family="Inter, Roboto, sans-serif">
  <rect width="960" height="500" fill="#1a1a2e"/>

  <!-- Title -->
  <text x="480" y="34" fill="#e2e8f0" font-size="18" font-weight="bold" text-anchor="middle">Tablero Kanban — WIP Limits y Flujo</text>

  <!-- ===== COLUMN HEADERS ===== -->
  <!-- Backlog -->
  <rect x="20" y="50" width="140" height="400" rx="10" fill="#16213e" stroke="#334155" stroke-width="1"/>
  <rect x="20" y="50" width="140" height="40" rx="10" fill="#334155"/>
  <rect x="20" y="78" width="140" height="12" fill="#334155"/>
  <text x="90" y="76" fill="#94a3b8" font-size="12" font-weight="bold" text-anchor="middle">BACKLOG</text>
  <text x="90" y="102" fill="#475569" font-size="10" text-anchor="middle">Sin límite</text>

  <!-- Análisis WIP:2 -->
  <rect x="170" y="50" width="150" height="400" rx="10" fill="#16213e" stroke="#0052CC" stroke-width="1.5"/>
  <rect x="170" y="50" width="150" height="40" rx="10" fill="#0052CC" fill-opacity="0.5"/>
  <rect x="170" y="78" width="150" height="12" fill="#0052CC" fill-opacity="0.5"/>
  <text x="245" y="72" fill="#93c5fd" font-size="12" font-weight="bold" text-anchor="middle">ANÁLISIS</text>
  <text x="245" y="86" fill="#93c5fd" font-size="10" text-anchor="middle">WIP: 2</text>
  <text x="245" y="102" fill="#475569" font-size="9" text-anchor="middle">Max 2 ítems activos</text>

  <!-- Desarrollo WIP:3 -->
  <rect x="330" y="50" width="180" height="400" rx="10" fill="#16213e" stroke="#0052CC" stroke-width="1.5"/>
  <rect x="330" y="50" width="180" height="40" rx="10" fill="#0052CC" fill-opacity="0.5"/>
  <rect x="330" y="78" width="180" height="12" fill="#0052CC" fill-opacity="0.5"/>
  <text x="420" y="72" fill="#93c5fd" font-size="12" font-weight="bold" text-anchor="middle">DESARROLLO</text>
  <text x="420" y="86" fill="#93c5fd" font-size="10" text-anchor="middle">WIP: 3</text>
  <text x="420" y="102" fill="#475569" font-size="9" text-anchor="middle">3 devs × 1 ítem c/u</text>

  <!-- Revisión WIP:2 — CUELLO DE BOTELLA -->
  <rect x="520" y="50" width="150" height="400" rx="10" fill="#16213e" stroke="#FF8B00" stroke-width="2"/>
  <rect x="520" y="50" width="150" height="40" rx="10" fill="#FF8B00" fill-opacity="0.5"/>
  <rect x="520" y="78" width="150" height="12" fill="#FF8B00" fill-opacity="0.5"/>
  <text x="595" y="72" fill="#FB923C" font-size="12" font-weight="bold" text-anchor="middle">REVISIÓN ⚠</text>
  <text x="595" y="86" fill="#FB923C" font-size="10" text-anchor="middle">WIP: 2 (violado: 4)</text>
  <text x="595" y="102" fill="#94a3b8" font-size="9" text-anchor="middle">← Cuello de botella</text>

  <!-- Staging WIP:2 -->
  <rect x="680" y="50" width="130" height="400" rx="10" fill="#16213e" stroke="#0052CC" stroke-width="1.5"/>
  <rect x="680" y="50" width="130" height="40" rx="10" fill="#0052CC" fill-opacity="0.5"/>
  <rect x="680" y="78" width="130" height="12" fill="#0052CC" fill-opacity="0.5"/>
  <text x="745" y="72" fill="#93c5fd" font-size="12" font-weight="bold" text-anchor="middle">STAGING</text>
  <text x="745" y="86" fill="#93c5fd" font-size="10" text-anchor="middle">WIP: 2</text>
  <text x="745" y="102" fill="#475569" font-size="9" text-anchor="middle">Pruebas en entorno real</text>

  <!-- Done -->
  <rect x="820" y="50" width="120" height="400" rx="10" fill="#16213e" stroke="#36B37E" stroke-width="1.5"/>
  <rect x="820" y="50" width="120" height="40" rx="10" fill="#36B37E" fill-opacity="0.4"/>
  <rect x="820" y="78" width="120" height="12" fill="#36B37E" fill-opacity="0.4"/>
  <text x="880" y="76" fill="#4ade80" font-size="12" font-weight="bold" text-anchor="middle">DONE ✓</text>

