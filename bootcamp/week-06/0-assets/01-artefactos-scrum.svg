<svg viewBox="0 0 900 480" xmlns="http://www.w3.org/2000/svg" font-family="Inter, Roboto, sans-serif">
  <rect width="900" height="480" fill="#1a1a2e"/>

  <!-- Title -->
  <text x="450" y="36" fill="#e2e8f0" font-size="19" font-weight="bold" text-anchor="middle">Artefactos de Scrum + Compromisos</text>

  <!-- ===== PRODUCT BACKLOG ===== -->
  <rect x="40" y="60" width="240" height="300" rx="14" fill="#16213e" stroke="#0052CC" stroke-width="2"/>
  <rect x="40" y="60" width="240" height="44" rx="14" fill="#0052CC"/>
  <rect x="40" y="90" width="240" height="14" fill="#0052CC"/>
  <text x="160" y="88" fill="#fff" font-size="14" font-weight="bold" text-anchor="middle">Product Backlog</text>

  <!-- PBI items (ordered list) -->
  <rect x="58" y="118" width="204" height="26" rx="6" fill="#0052CC" fill-opacity="0.3"/>
  <text x="70" y="136" fill="#93c5fd" font-size="11">1▲ US-001: Login de usuario</text>
  <rect x="58" y="150" width="204" height="26" rx="6" fill="#0052CC" fill-opacity="0.2"/>
  <text x="70" y="168" fill="#93c5fd" font-size="11">2▲ US-002: Registro de cuenta</text>
  <rect x="58" y="182" width="204" height="26" rx="6" fill="#0052CC" fill-opacity="0.15"/>
  <text x="70" y="200" fill="#94a3b8" font-size="11">3  US-003: Dashboard principal</text>
  <rect x="58" y="214" width="204" height="26" rx="6" fill="#0052CC" fill-opacity="0.1"/>
  <text x="70" y="232" fill="#64748b" font-size="11">4  US-010: Exportar a PDF</text>
  <text x="160" y="262" fill="#475569" font-size="10" text-anchor="middle">... más ítems ...</text>

  <!-- Commitment: Product Goal -->
  <rect x="58" y="280" width="204" height="62" rx="8" fill="#FF8B00" fill-opacity="0.15" stroke="#FF8B00" stroke-width="1"/>
  <text x="160" y="298" fill="#FB923C" font-size="11" font-weight="bold" text-anchor="middle">Compromiso</text>
  <text x="160" y="314" fill="#FB923C" font-size="12" font-weight="bold" text-anchor="middle">Product Goal</text>
  <text x="160" y="330" fill="#94a3b8" font-size="10" text-anchor="middle">Objetivo a largo plazo</text>

  <!-- Owner label -->
  <text x="160" y="376" fill="#64748b" font-size="10" text-anchor="middle">Gestiona: Product Owner</text>

  <!-- ===== SPRINT BACKLOG ===== -->
  <rect x="330" y="60" width="240" height="300" rx="14" fill="#16213e" stroke="#0052CC" stroke-width="2"/>
  <rect x="330" y="60" width="240" height="44" rx="14" fill="#0052CC"/>
  <rect x="330" y="90" width="240" height="14" fill="#0052CC"/>
  <text x="450" y="88" fill="#fff" font-size="14" font-weight="bold" text-anchor="middle">Sprint Backlog</text>

  <!-- Tasks -->
  <text x="450" y="118" fill="#64748b" font-size="10" text-anchor="middle">Sprint Goal</text>
  <rect x="348" y="124" width="204" height="22" rx="5" fill="#36B37E" fill-opacity="0.2" stroke="#36B37E" stroke-width="0.8"/>
  <text x="450" y="139" fill="#4ade80" font-size="10" text-anchor="middle">"Para X, el equipo Y"</text>

  <text x="348" y="163" fill="#94a3b8" font-size="10">To Do</text>
  <rect x="348" y="168" width="90" height="20" rx="4" fill="#0052CC" fill-opacity="0.3"/>
  <text x="393" y="182" fill="#93c5fd" font-size="10" text-anchor="middle">Tarea A</text>
  <rect x="348" y="193" width="90" height="20" rx="4" fill="#0052CC" fill-opacity="0.3"/>
  <text x="393" y="207" fill="#93c5fd" font-size="10" text-anchor="middle">Tarea B</text>

  <text x="460" y="163" fill="#94a3b8" font-size="10">En progreso</text>
  <rect x="458" y="168" width="90" height="20" rx="4" fill="#FF8B00" fill-opacity="0.25"/>
  <text x="503" y="182" fill="#FB923C" font-size="10" text-anchor="middle">Tarea C</text>

  <!-- Commitment: Sprint Goal -->
  <rect x="348" y="280" width="204" height="62" rx="8" fill="#FF8B00" fill-opacity="0.15" stroke="#FF8B00" stroke-width="1"/>
  <text x="450" y="298" fill="#FB923C" font-size="11" font-weight="bold" text-anchor="middle">Compromiso</text>
  <text x="450" y="314" fill="#FB923C" font-size="12" font-weight="bold" text-anchor="middle">Sprint Goal</text>
  <text x="450" y="330" fill="#94a3b8" font-size="10" text-anchor="middle">Objetivo del Sprint</text>

  <!-- Owner label -->
  <text x="450" y="376" fill="#64748b" font-size="10" text-anchor="middle">Gestiona: Developers</text>

  <!-- ===== INCREMENT ===== -->
  <rect x="620" y="60" width="240" height="300" rx="14" fill="#16213e" stroke="#36B37E" stroke-width="2"/>
  <rect x="620" y="60" width="240" height="44" rx="14" fill="#36B37E" fill-opacity="0.7"/>
  <rect x="620" y="90" width="240" height="14" fill="#36B37E" fill-opacity="0.7"/>
  <text x="740" y="88" fill="#fff" font-size="14" font-weight="bold" text-anchor="middle">Incremento</text>

  <!-- DoD items -->
  <text x="638" y="120" fill="#4ade80" font-size="11">✔ Code review completado</text>
  <text x="638" y="140" fill="#4ade80" font-size="11">✔ Tests: cobertura ≥80%</text>
  <text x="638" y="160" fill="#4ade80" font-size="11">✔ Desplegado en staging</text>
  <text x="638" y="180" fill="#4ade80" font-size="11">✔ Acceptance testing OK</text>
  <text x="638" y="200" fill="#4ade80" font-size="11">✔ Documentación actualizada</text>

  <text x="740" y="234" fill="#94a3b8" font-size="11" text-anchor="middle">Si no cumple DoD →</text>
  <text x="740" y="251" fill="#FF8B00" font-size="11" text-anchor="middle">NO es parte del Incremento</text>

  <!-- Commitment: DoD -->
  <rect x="638" y="280" width="204" height="62" rx="8" fill="#FF8B00" fill-opacity="0.15" stroke="#FF8B00" stroke-width="1"/>
  <text x="740" y="298" fill="#FB923C" font-size="11" font-weight="bold" text-anchor="middle">Compromiso</text>
  <text x="740" y="314" fill="#FB923C" font-size="12" font-weight="bold" text-anchor="middle">Definition of Done</text>
  <text x="740" y="330" fill="#94a3b8" font-size="10" text-anchor="middle">Criterios de calidad mínimos</text>

  <!-- Owner label -->
  <text x="740" y="376" fill="#64748b" font-size="10" text-anchor="middle">Gestiona: Todo el Scrum Team</text>

  <!-- Arrows between artifacts -->
  <defs>
    <marker id="a1" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#0052CC"/>
    </marker>
  </defs>
  <line x1="282" y1="195" x2="328" y2="195" stroke="#0052CC" stroke-width="1.5" marker-end="url(#a1)"/>
  <text x="305" y="188" fill="#64748b" font-size="9" text-anchor="middle">Sprint</text>
  <text x="305" y="199" fill="#64748b" font-size="9" text-anchor="middle">Planning</text>

  <line x1="572" y1="195" x2="618" y2="195" stroke="#0052CC" stroke-width="1.5" marker-end="url(#a1)"/>
  <text x="595" y="188" fill="#64748b" font-size="9" text-anchor="middle">Sprint</text>
  <text x="595" y="199" fill="#64748b" font-size="9" text-anchor="middle">trabajo</text>

  <!-- Transparency row -->
  <rect x="40" y="400" width="820" height="55" rx="10" fill="#16213e" stroke="#0052CC" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="450" y="422" fill="#93c5fd" font-size="12" font-weight="bold" text-anchor="middle">Transparencia — Inspección — Adaptación</text>
  <text x="450" y="442" fill="#64748b" font-size="11" text-anchor="middle">Los 3 artefactos + sus compromisos hacen visible el trabajo, el progreso y la calidad</text>
</svg>
