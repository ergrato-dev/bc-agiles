<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" width="900" height="520">
  <!-- Fondo -->
  <rect width="900" height="520" fill="#1a1a2e"/>

  <!-- Título -->
  <text x="450" y="38" font-family="Inter, Roboto, sans-serif" font-size="18" font-weight="700" fill="#ffffff" text-anchor="middle">Flujo del Sprint Review</text>

  <!-- Etapa 0: Preparación (SM) -->
  <rect x="30" y="65" width="160" height="64" rx="8" fill="#16213e" stroke="#0052CC" stroke-width="1.5"/>
  <text x="110" y="90" font-family="Inter, Roboto, sans-serif" font-size="11" font-weight="700" fill="#7eb3ff" text-anchor="middle">PREPARACIÓN</text>
  <text x="110" y="107" font-family="Inter, Roboto, sans-serif" font-size="10" fill="#b0c4de" text-anchor="middle">SM confirma asistencia</text>
  <text x="110" y="121" font-family="Inter, Roboto, sans-serif" font-size="10" fill="#b0c4de" text-anchor="middle">equipo prepara demo</text>

  <!-- Flecha 0→1 -->
  <line x1="190" y1="97" x2="225" y2="97" stroke="#0052CC" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Etapa 1: Contexto -->
  <rect x="225" y="65" width="155" height="64" rx="8" fill="#16213e" stroke="#0052CC" stroke-width="1.5"/>
  <text x="302" y="90" font-family="Inter, Roboto, sans-serif" font-size="11" font-weight="700" fill="#7eb3ff" text-anchor="middle">CONTEXTO</text>
  <text x="302" y="107" font-family="Inter, Roboto, sans-serif" font-size="10" fill="#b0c4de" text-anchor="middle">Sprint Goal revisado</text>
  <text x="302" y="121" font-family="Inter, Roboto, sans-serif" font-size="10" fill="#b0c4de" text-anchor="middle">Capacidad del Sprint</text>

  <!-- Flecha 1→2 -->
  <line x1="380" y1="97" x2="415" y2="97" stroke="#0052CC" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Etapa 2: Demo del Incremento -->
  <rect x="415" y="65" width="155" height="64" rx="8" fill="#16213e" stroke="#0052CC" stroke-width="1.5"/>
  <text x="492" y="90" font-family="Inter, Roboto, sans-serif" font-size="11" font-weight="700" fill="#7eb3ff" text-anchor="middle">DEMO DEL</text>
  <text x="492" y="104" font-family="Inter, Roboto, sans-serif" font-size="11" font-weight="700" fill="#7eb3ff" text-anchor="middle">INCREMENTO</text>
  <text x="492" y="121" font-family="Inter, Roboto, sans-serif" font-size="10" fill="#b0c4de" text-anchor="middle">solo ítems con DoD ✅</text>

  <!-- Flecha 2→3 -->
  <line x1="570" y1="97" x2="605" y2="97" stroke="#0052CC" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Etapa 3: Feedback stakeholders -->
  <rect x="605" y="65" width="155" height="64" rx="8" fill="#16213e" stroke="#FF8B00" stroke-width="1.5"/>
  <text x="682" y="90" font-family="Inter, Roboto, sans-serif" font-size="11" font-weight="700" fill="#ffa940" text-anchor="middle">FEEDBACK</text>
  <text x="682" y="107" font-family="Inter, Roboto, sans-serif" font-size="10" fill="#b0c4de" text-anchor="middle">Preguntas guiadas</text>
  <text x="682" y="121" font-family="Inter, Roboto, sans-serif" font-size="10" fill="#b0c4de" text-anchor="middle">Conversación colaborativa</text>

  <!-- Flecha 3→4 baja -->
  <line x1="682" y1="129" x2="682" y2="175" stroke="#0052CC" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Etapa 4: Clasificar feedback -->
  <rect x="590" y="175" width="185" height="70" rx="8" fill="#16213e" stroke="#0052CC" stroke-width="1.5"/>
  <text x="682" y="198" font-family="Inter, Roboto, sans-serif" font-size="11" font-weight="700" fill="#7eb3ff" text-anchor="middle">CLASIFICAR FEEDBACK</text>
  <text x="682" y="215" font-family="Inter, Roboto, sans-serif" font-size="10" fill="#b0c4de" text-anchor="middle">Nuevo requerimiento</text>
  <text x="682" y="229" font-family="Inter, Roboto, sans-serif" font-size="10" fill="#b0c4de" text-anchor="middle">Ajuste · Validación · Fuera de scope</text>

  <!-- Flecha 4 → Backlog -->
  <line x1="590" y1="210" x2="450" y2="255" stroke="#0052CC" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Etapa 5: Actualizar Backlog -->
  <rect x="295" y="255" width="185" height="70" rx="8" fill="#16213e" stroke="#36B37E" stroke-width="2"/>
  <text x="387" y="278" font-family="Inter, Roboto, sans-serif" font-size="11" font-weight="700" fill="#36B37E" text-anchor="middle">ACTUALIZAR BACKLOG</text>
  <text x="387" y="295" font-family="Inter, Roboto, sans-serif" font-size="10" fill="#b0c4de" text-anchor="middle">Agregar · Re-priorizar · Cancelar</text>
  <text x="387" y="309" font-family="Inter, Roboto, sans-serif" font-size="10" fill="#b0c4de" text-anchor="middle">Product Owner decide</text>

  <!-- Flecha Backlog → Sprint Planning -->
  <line x1="387" y1="325" x2="387" y2="375" stroke="#36B37E" stroke-width="1.5" marker-end="url(#arrowGreen)"/>

  <!-- Etapa 6: Sprint Planning siguiente -->
  <rect x="295" y="375" width="185" height="64" rx="8" fill="#16213e" stroke="#36B37E" stroke-width="1.5"/>
  <text x="387" y="400" font-family="Inter, Roboto, sans-serif" font-size="11" font-weight="700" fill="#36B37E" text-anchor="middle">SPRINT PLANNING</text>
  <text x="387" y="417" font-family="Inter, Roboto, sans-serif" font-size="10" fill="#b0c4de" text-anchor="middle">Backlog actualizado listo</text>
  <text x="387" y="431" font-family="Inter, Roboto, sans-serif" font-size="10" fill="#b0c4de" text-anchor="middle">Próximo Sprint</text>

  <!-- Señal de Review exitosa -->
  <rect x="30" y="270" width="220" height="55" rx="8" fill="#16213e" stroke="#36B37E" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="140" y="293" font-family="Inter, Roboto, sans-serif" font-size="11" font-weight="700" fill="#36B37E" text-anchor="middle">✅ Review exitosa</text>
  <text x="140" y="310" font-family="Inter, Roboto, sans-serif" font-size="10" fill="#b0c4de" text-anchor="middle">El backlog cambia después</text>
  <text x="140" y="324" font-family="Inter, Roboto, sans-serif" font-size="10" fill="#b0c4de" text-anchor="middle">de la conversación</text>

  <!-- Antipatrón -->
  <rect x="30" y="375" width="220" height="55" rx="8" fill="#16213e" stroke="#FF8B00" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="140" y="398" font-family="Inter, Roboto, sans-serif" font-size="11" font-weight="700" fill="#FF8B00" text-anchor="middle">⚠️ Antipatrón</text>
  <text x="140" y="415" font-family="Inter, Roboto, sans-serif" font-size="10" fill="#b0c4de" text-anchor="middle">Backlog idéntico = feedback</text>
  <text x="140" y="429" font-family="Inter, Roboto, sans-serif" font-size="10" fill="#b0c4de" text-anchor="middle">sin valor real capturado</text>

  <!-- Duración banner -->
  <rect x="580" y="390" width="280" height="60" rx="8" fill="#0052CC" fill-opacity="0.15" stroke="#0052CC" stroke-width="1"/>
  <text x="720" y="414" font-family="Inter, Roboto, sans-serif" font-size="11" font-weight="700" fill="#7eb3ff" text-anchor="middle">Duración máxima</text>
  <text x="720" y="432" font-family="Inter, Roboto, sans-serif" font-size="13" font-weight="700" fill="#ffffff" text-anchor="middle">4 horas (Sprint de 1 mes)</text>
  <text x="720" y="447" font-family="Inter, Roboto, sans-serif" font-size="10" fill="#b0c4de" text-anchor="middle">Proporcional a Sprints más cortos</text>

  <!-- Leyenda -->
  <rect x="30" y="470" width="14" height="14" rx="3" fill="none" stroke="#0052CC" stroke-width="2"/>
  <text x="50" y="482" font-family="Inter, Roboto, sans-serif" font-size="10" fill="#b0c4de">Evento / actividad</text>
  <rect x="180" y="470" width="14" height="14" rx="3" fill="none" stroke="#36B37E" stroke-width="2"/>
  <text x="200" y="482" font-family="Inter, Roboto, sans-serif" font-size="10" fill="#b0c4de">Resultado positivo</text>
  <rect x="340" y="470" width="14" height="14" rx="3" fill="none" stroke="#FF8B00" stroke-width="2"/>
  <text x="360" y="482" font-family="Inter, Roboto, sans-serif" font-size="10" fill="#b0c4de">Riesgo / antipatrón</text>

  <!-- Markers -->
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0052CC"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#36B37E"/>
    </marker>
  </defs>
</svg>
