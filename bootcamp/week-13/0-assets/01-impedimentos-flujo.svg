<svg viewBox="0 0 900 460" xmlns="http://www.w3.org/2000/svg" font-family="Inter, Roboto, sans-serif">
  <!-- Background -->
  <rect width="900" height="460" fill="#1a1a2e"/>
  <text x="450" y="30" text-anchor="middle" font-size="17" font-weight="bold" fill="#ffffff">Gestión de Impedimentos — Escalación en 3 Niveles</text>

  <!-- Impediment detected (top input) -->
  <rect x="320" y="50" width="260" height="50" rx="8" fill="#16213e" stroke="#FF8B00" stroke-width="2"/>
  <text x="450" y="70" text-anchor="middle" font-size="12" font-weight="bold" fill="#FF8B00">⚠ Impedimento detectado</text>
  <text x="450" y="88" text-anchor="middle" font-size="10" fill="#aabbcc">en Daily Scrum o Sprint Board</text>

  <!-- Down arrow -->
  <line x1="450" y1="100" x2="450" y2="120" stroke="#FF8B00" stroke-width="1.5" marker-end="url(#arr-orange)"/>

  <!-- Decision: team can solve? -->
  <polygon points="450,120 380,158 450,196 520,158" fill="#16213e" stroke="#aabbcc" stroke-width="1.5"/>
  <text x="450" y="153" text-anchor="middle" font-size="10" fill="#aabbcc">¿Puede el</text>
  <text x="450" y="167" text-anchor="middle" font-size="10" fill="#aabbcc">equipo resolverlo?</text>

  <!-- YES → Obstacle -->
  <line x1="520" y1="158" x2="680" y2="158" stroke="#36B37E" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <text x="600" y="150" text-anchor="middle" font-size="9" fill="#36B37E">SÍ</text>
  <rect x="680" y="136" width="180" height="44" rx="6" fill="#0f3460" stroke="#36B37E" stroke-width="1.5"/>
  <text x="770" y="155" text-anchor="middle" font-size="11" font-weight="bold" fill="#36B37E">Obstáculo</text>
  <text x="770" y="172" text-anchor="middle" font-size="9" fill="#aabbcc">Equipo lo gestiona internamente</text>

  <!-- NO → Level 1 -->
  <line x1="450" y1="196" x2="450" y2="220" stroke="#FF8B00" stroke-width="1.5" marker-end="url(#arr-orange)"/>
  <text x="462" y="212" font-size="9" fill="#FF8B00">NO</text>

  <!-- Level 1 -->
  <rect x="170" y="220" width="560" height="54" rx="8" fill="#16213e" stroke="#0052CC" stroke-width="1.5"/>
  <text x="210" y="242" font-size="11" font-weight="bold" fill="#0052CC">Nivel 1 — SM intenta resolver (Día 1–2)</text>
  <text x="210" y="260" font-size="9" fill="#aabbcc">SM contacta internamente al área responsable · Registra el impedimento en el ROAM</text>
  <!-- Level 1 ROAM badge -->
  <rect x="650" y="228" width="65" height="24" rx="4" fill="#0052CC"/>
  <text x="682" y="244" text-anchor="middle" font-size="9" font-weight="bold" fill="#ffffff">ROAM: O</text>

  <!-- Arrow Level 1 → 2 -->
  <line x1="450" y1="274" x2="450" y2="298" stroke="#FF8B00" stroke-width="1.5" marker-end="url(#arr-orange)"/>
  <text x="462" y="290" font-size="9" fill="#FF8B00">sin resolución &gt; 2 días</text>

  <!-- Level 2 -->
  <rect x="170" y="298" width="560" height="54" rx="8" fill="#16213e" stroke="#FF8B00" stroke-width="1.5"/>
  <text x="210" y="320" font-size="11" font-weight="bold" fill="#FF8B00">Nivel 2 — SM escala a liderazgo (Día 3–4)</text>
  <text x="210" y="338" font-size="9" fill="#aabbcc">SM presenta datos: días bloqueados + impacto en Sprint Goal · Escalado a Gerencia/TI</text>
  <rect x="650" y="306" width="65" height="24" rx="4" fill="#FF8B00"/>
  <text x="682" y="322" text-anchor="middle" font-size="9" font-weight="bold" fill="#ffffff">ROAM: O</text>

  <!-- Arrow Level 2 → 3 -->
  <line x1="450" y1="352" x2="450" y2="376" stroke="#FF8B00" stroke-width="1.5" marker-end="url(#arr-orange)"/>
  <text x="462" y="368" font-size="9" fill="#FF8B00">Sprint Goal en riesgo</text>

  <!-- Level 3 -->
  <rect x="170" y="376" width="560" height="54" rx="8" fill="#3d1010" stroke="#FF8B00" stroke-width="2"/>
  <text x="210" y="398" font-size="11" font-weight="bold" fill="#FF8B00">Nivel 3 — Escalación a Dirección (inmediato)</text>
  <text x="210" y="416" font-size="9" fill="#aabbcc">PO + Dirección informados · Decisión: replanning del Sprint o resolución ejecutiva</text>
  <rect x="650" y="384" width="65" height="24" rx="4" fill="#660000"/>
  <text x="682" y="400" text-anchor="middle" font-size="9" font-weight="bold" fill="#ffffff">ROAM: A/M</text>

  <!-- ROAM legend (bottom right) -->
  <rect x="700" y="430" width="190" height="20" rx="3" fill="#16213e"/>
  <text x="795" y="444" text-anchor="middle" font-size="8" fill="#aabbcc">ROAM: Resolved · Owned · Accepted · Mitigated</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arr-orange" markerWidth="7" markerHeight="7" refX="3.5" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7 Z" fill="#FF8B00"/>
    </marker>
    <marker id="arr-green" markerWidth="7" markerHeight="7" refX="3.5" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7 Z" fill="#36B37E"/>
    </marker>
  </defs>
</svg>
