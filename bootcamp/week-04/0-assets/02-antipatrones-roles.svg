<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 380" width="860" height="380" font-family="Inter, Roboto, Open Sans, system-ui, sans-serif">
  <rect width="860" height="380" fill="#1a1a2e"/>
  <text x="430" y="28" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">Antipatrones de Roles en Scrum</text>

  <!-- Headers -->
  <text x="120" y="56" text-anchor="middle" font-size="12" font-weight="600" fill="#90cdf4">Scrum Master</text>
  <text x="430" y="56" text-anchor="middle" font-size="12" font-weight="600" fill="#9ae6b4">Product Owner</text>
  <text x="720" y="56" text-anchor="middle" font-size="12" font-weight="600" fill="#fbd38d">Dev Team</text>

  <!-- SM antipatrones -->
  <rect x="30" y="66" width="180" height="72" rx="6" fill="#2d1b1b" stroke="#fc8181" stroke-width="1"/>
  <text x="120" y="84" text-anchor="middle" font-size="11" font-weight="600" fill="#fc8181">SM Asignador</text>
  <text x="120" y="102" text-anchor="middle" font-size="10" fill="#e2e8f0">Asigna tareas él mismo</text>
  <text x="120" y="118" text-anchor="middle" font-size="10" fill="#a0aec0">→ bloquea autoorganización</text>

  <rect x="30" y="152" width="180" height="72" rx="6" fill="#2d1b1b" stroke="#fc8181" stroke-width="1"/>
  <text x="120" y="170" text-anchor="middle" font-size="11" font-weight="600" fill="#fc8181">Proxy Manager</text>
  <text x="120" y="188" text-anchor="middle" font-size="10" fill="#e2e8f0">Transmite órdenes del mgmt</text>
  <text x="120" y="204" text-anchor="middle" font-size="10" fill="#a0aec0">→ no protege al equipo</text>

  <!-- PO antipatrones -->
  <rect x="340" y="66" width="180" height="72" rx="6" fill="#2d1b1b" stroke="#fc8181" stroke-width="1"/>
  <text x="430" y="84" text-anchor="middle" font-size="11" font-weight="600" fill="#fc8181">PO Ausente</text>
  <text x="430" y="102" text-anchor="middle" font-size="10" fill="#e2e8f0">No responde dudas del equipo</text>
  <text x="430" y="118" text-anchor="middle" font-size="10" fill="#a0aec0">→ historias mal definidas</text>

  <rect x="340" y="152" width="180" height="72" rx="6" fill="#2d1b1b" stroke="#fc8181" stroke-width="1"/>
  <text x="430" y="170" text-anchor="middle" font-size="11" font-weight="600" fill="#fc8181">PO Teléfono</text>
  <text x="430" y="188" text-anchor="middle" font-size="10" fill="#e2e8f0">Solo anota lo que piden</text>
  <text x="430" y="204" text-anchor="middle" font-size="10" fill="#a0aec0">→ backlog sin valor real</text>

  <!-- Dev antipatrones -->
  <rect x="650" y="66" width="180" height="72" rx="6" fill="#2d1b1b" stroke="#fc8181" stroke-width="1"/>
  <text x="740" y="84" text-anchor="middle" font-size="11" font-weight="600" fill="#fc8181">Equipo en silos</text>
  <text x="740" y="102" text-anchor="middle" font-size="10" fill="#e2e8f0">Cada dev solo en "su área"</text>
  <text x="740" y="118" text-anchor="middle" font-size="10" fill="#a0aec0">→ historias nunca Done</text>

  <rect x="650" y="152" width="180" height="72" rx="6" fill="#2d1b1b" stroke="#fc8181" stroke-width="1"/>
  <text x="740" y="170" text-anchor="middle" font-size="11" font-weight="600" fill="#fc8181">Equipo sin voz</text>
  <text x="740" y="188" text-anchor="middle" font-size="10" fill="#e2e8f0">Acepta compromisos irreales</text>
  <text x="740" y="204" text-anchor="middle" font-size="10" fill="#a0aec0">→ Sprint siempre falla</text>

  <!-- Correcciones -->
  <rect x="30" y="246" width="180" height="60" rx="6" fill="#1a3a2a" stroke="#36B37E" stroke-width="1"/>
  <text x="120" y="264" text-anchor="middle" font-size="10" font-weight="600" fill="#9ae6b4">✓ Corrección SM</text>
  <text x="120" y="282" text-anchor="middle" font-size="10" fill="#e2e8f0">Facilita sin decidir</text>
  <text x="120" y="298" text-anchor="middle" font-size="10" fill="#e2e8f0">Redirige al PO y Sprint Review</text>

  <rect x="340" y="246" width="180" height="60" rx="6" fill="#1a3a2a" stroke="#36B37E" stroke-width="1"/>
  <text x="430" y="264" text-anchor="middle" font-size="10" font-weight="600" fill="#9ae6b4">✓ Corrección PO</text>
  <text x="430" y="282" text-anchor="middle" font-size="10" fill="#e2e8f0">30 min/día disponible</text>
  <text x="430" y="298" text-anchor="middle" font-size="10" fill="#e2e8f0">Priorizar por valor de negocio</text>

  <rect x="650" y="246" width="180" height="60" rx="6" fill="#1a3a2a" stroke="#36B37E" stroke-width="1"/>
  <text x="740" y="264" text-anchor="middle" font-size="10" font-weight="600" fill="#9ae6b4">✓ Corrección Dev</text>
  <text x="740" y="282" text-anchor="middle" font-size="10" fill="#e2e8f0">Mob/pair en stories críticas</text>
  <text x="740" y="298" text-anchor="middle" font-size="10" fill="#e2e8f0">Compromiso basado en capacidad</text>

  <!-- Footer -->
  <rect x="30" y="326" width="800" height="26" rx="4" fill="#0d1b2a" stroke="#2d3748"/>
  <text x="430" y="344" text-anchor="middle" font-size="10" fill="#718096">Los antipatrones de roles son la causa #1 de fracaso en adopciones de Scrum — Scrum.org research</text>
</svg>
