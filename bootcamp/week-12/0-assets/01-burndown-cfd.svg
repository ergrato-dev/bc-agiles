<svg viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg" font-family="Inter, Roboto, sans-serif">
  <!-- Background -->
  <rect width="900" height="500" fill="#1a1a2e"/>
  <text x="450" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#ffffff">Métricas Ágiles — Burndown Chart + CFD</text>

  <!-- ===== BURNDOWN CHART (left) ===== -->
  <rect x="30" y="50" width="400" height="280" rx="8" fill="#16213e" stroke="#0052CC" stroke-width="1.5"/>
  <text x="230" y="76" text-anchor="middle" font-size="13" font-weight="bold" fill="#0052CC">Burndown Chart — Sprint 5</text>

  <!-- Axes -->
  <line x1="70" y1="280" x2="390" y2="280" stroke="#aabbcc" stroke-width="1"/>
  <line x1="70" y1="280" x2="70" y2="96" stroke="#aabbcc" stroke-width="1"/>

  <!-- Y labels (points) -->
  <text x="62" y="100" text-anchor="end" font-size="9" fill="#aabbcc">24</text>
  <text x="62" y="136" text-anchor="end" font-size="9" fill="#aabbcc">18</text>
  <text x="62" y="172" text-anchor="end" font-size="9" fill="#aabbcc">12</text>
  <text x="62" y="208" text-anchor="end" font-size="9" fill="#aabbcc">6</text>
  <text x="62" y="280" text-anchor="end" font-size="9" fill="#aabbcc">0</text>

  <!-- X labels (days) -->
  <text x="70" y="294" text-anchor="middle" font-size="9" fill="#aabbcc">D1</text>
  <text x="102" y="294" text-anchor="middle" font-size="9" fill="#aabbcc">D2</text>
  <text x="134" y="294" text-anchor="middle" font-size="9" fill="#aabbcc">D3</text>
  <text x="166" y="294" text-anchor="middle" font-size="9" fill="#aabbcc">D4</text>
  <text x="198" y="294" text-anchor="middle" font-size="9" fill="#aabbcc">D5</text>
  <text x="230" y="294" text-anchor="middle" font-size="9" fill="#aabbcc">D6</text>
  <text x="262" y="294" text-anchor="middle" font-size="9" fill="#aabbcc">D7</text>
  <text x="294" y="294" text-anchor="middle" font-size="9" fill="#aabbcc">D8</text>
  <text x="326" y="294" text-anchor="middle" font-size="9" fill="#aabbcc">D9</text>
  <text x="358" y="294" text-anchor="middle" font-size="9" fill="#aabbcc">D10</text>

  <!-- Grid lines horizontal -->
  <line x1="70" y1="100" x2="390" y2="100" stroke="#2a3a5e" stroke-width="0.5" stroke-dasharray="3,3"/>
  <line x1="70" y1="136" x2="390" y2="136" stroke="#2a3a5e" stroke-width="0.5" stroke-dasharray="3,3"/>
  <line x1="70" y1="172" x2="390" y2="172" stroke="#2a3a5e" stroke-width="0.5" stroke-dasharray="3,3"/>
  <line x1="70" y1="208" x2="390" y2="208" stroke="#2a3a5e" stroke-width="0.5" stroke-dasharray="3,3"/>

  <!-- Ideal line (24 pts → 0 in 10 days) -->
  <!-- Day 1=70, step=32px per day; pts: 24=y100, 0=y280 → scale: 1pt = 7.5px -->
  <polyline points="70,100 102,117 134,134 166,151 198,168 230,185 262,202 294,219 326,236 358,253 390,280"
    fill="none" stroke="#aabbcc" stroke-width="1.5" stroke-dasharray="6,3"/>

  <!-- Real line (team has flat first 3 days, then recovers, then spike) -->
  <polyline points="70,100 102,100 134,100 166,90 198,150 230,172 262,172 294,200 326,230 358,252 390,275"
    fill="none" stroke="#FF8B00" stroke-width="2.5"/>
  <!-- Scope creep spike (day 4 goes UP) -->
  <text x="174" y="83" font-size="8" fill="#FF8B00">⚠ scope up</text>

  <!-- Labels -->
  <text x="375" y="268" font-size="8" fill="#aabbcc">Ideal</text>
  <text x="375" y="258" font-size="8" fill="#FF8B00">Real</text>

  <!-- Legends -->
  <line x1="290" y1="318" x2="320" y2="318" stroke="#aabbcc" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="326" y="322" font-size="9" fill="#aabbcc">Línea ideal</text>
  <line x1="290" y1="332" x2="320" y2="332" stroke="#FF8B00" stroke-width="2"/>
  <text x="326" y="336" font-size="9" fill="#FF8B00">Línea real</text>

  <!-- ===== CFD (right) ===== -->
  <rect x="470" y="50" width="400" height="280" rx="8" fill="#16213e" stroke="#0052CC" stroke-width="1.5"/>
  <text x="670" y="76" text-anchor="middle" font-size="13" font-weight="bold" fill="#0052CC">Cumulative Flow Diagram</text>

  <!-- CFD Axes -->
  <line x1="510" y1="280" x2="830" y2="280" stroke="#aabbcc" stroke-width="1"/>
  <line x1="510" y1="280" x2="510" y2="96" stroke="#aabbcc" stroke-width="1"/>
  <text x="503" y="100" text-anchor="end" font-size="9" fill="#aabbcc">20</text>
  <text x="503" y="148" text-anchor="end" font-size="9" fill="#aabbcc">15</text>
  <text x="503" y="196" text-anchor="end" font-size="9" fill="#aabbcc">10</text>
  <text x="503" y="244" text-anchor="end" font-size="9" fill="#aabbcc">5</text>
  <text x="670" y="294" text-anchor="middle" font-size="9" fill="#aabbcc">Tiempo →</text>

  <!-- CFD bands (filled areas) from bottom to top: Done, Review, InProgress, ToDo -->
  <!-- Done (bottom, green) -->
  <polygon points="510,280 560,280 610,270 660,255 710,230 760,205 810,175 830,165 830,280 510,280"
    fill="#1a4a2e" stroke="none"/>
  <!-- Review (orange, sits on top of Done) -->
  <polygon points="510,280 560,270 610,256 660,238 710,218 760,198 810,172 830,162
                   830,145 810,150 760,178 710,200 660,218 610,236 560,250 510,265"
    fill="#3d2a0a" stroke="none"/>
  <!-- InProgress (blue) — wider band = bottleneck -->
  <polygon points="510,265 560,250 610,236 660,218 710,200 760,178 810,150 830,145
                   830,110 810,112 760,125 710,148 660,165 610,178 560,200 510,218"
    fill="#0a1a3d" stroke="none"/>
  <!-- ToDo (light, top) -->
  <polygon points="510,218 560,200 610,178 660,165 710,148 760,125 810,112 830,110
                   830,96 810,96 760,96 710,96 660,96 610,96 560,96 510,96"
    fill="#16213e" stroke="none"/>

  <!-- Band borders -->
  <polyline points="510,280 560,280 610,270 660,255 710,230 760,205 810,175 830,165"
    fill="none" stroke="#36B37E" stroke-width="1.5"/>
  <polyline points="510,265 560,250 610,236 660,218 710,200 760,178 810,150 830,145"
    fill="none" stroke="#FF8B00" stroke-width="1.5"/>
  <polyline points="510,218 560,200 610,178 660,165 710,148 760,125 810,112 830,110"
    fill="none" stroke="#0052CC" stroke-width="1.5"/>
  <polyline points="510,96 560,96 610,96 660,96 710,96 760,96 810,96 830,96"
    fill="none" stroke="#aabbcc" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- CFD Legend -->
  <rect x="520" y="96" width="10" height="10" fill="#aabbcc" opacity="0.6"/>
  <text x="535" y="106" font-size="8" fill="#aabbcc">To Do</text>
  <rect x="520" y="110" width="10" height="10" fill="#0052CC" opacity="0.8"/>
  <text x="535" y="120" font-size="8" fill="#0052CC">In Progress ⚠</text>
  <rect x="520" y="124" width="10" height="10" fill="#FF8B00" opacity="0.8"/>
  <text x="535" y="134" font-size="8" fill="#FF8B00">Review</text>
  <rect x="520" y="138" width="10" height="10" fill="#36B37E"/>
  <text x="535" y="148" font-size="8" fill="#36B37E">Done</text>

  <!-- Bottleneck annotation -->
  <text x="720" y="163" font-size="8" fill="#0052CC">banda ancha</text>
  <text x="720" y="173" font-size="8" fill="#0052CC">= cuello de botella</text>
  <line x1="718" y1="148" x2="760" y2="155" stroke="#0052CC" stroke-width="0.8"/>

  <!-- Lead Time arrow -->
  <line x1="570" y1="310" x2="780" y2="310" stroke="#aabbcc" stroke-width="1" marker-end="url(#ltarrow)" marker-start="url(#ltarrow2)"/>
  <text x="675" y="322" text-anchor="middle" font-size="9" fill="#aabbcc">Lead Time</text>

  <!-- Metrics summary row -->
  <rect x="30" y="355" width="840" height="110" rx="8" fill="#16213e" stroke="#0052CC" stroke-width="1"/>
  <text x="450" y="378" text-anchor="middle" font-size="12" font-weight="bold" fill="#aabbcc">Resumen de Métricas</text>

  <rect x="55" y="390" width="185" height="60" rx="5" fill="#1a1a2e"/>
  <text x="148" y="412" text-anchor="middle" font-size="11" font-weight="bold" fill="#36B37E">Velocity</text>
  <text x="148" y="430" text-anchor="middle" font-size="9" fill="#aabbcc">Promedio pts completados</text>
  <text x="148" y="444" text-anchor="middle" font-size="9" fill="#aabbcc">con DoD en últimos sprints</text>

  <rect x="262" y="390" width="185" height="60" rx="5" fill="#1a1a2e"/>
  <text x="355" y="412" text-anchor="middle" font-size="11" font-weight="bold" fill="#FF8B00">Lead Time</text>
  <text x="355" y="430" text-anchor="middle" font-size="9" fill="#aabbcc">Desde creación hasta entrega</text>
  <text x="355" y="444" text-anchor="middle" font-size="9" fill="#aabbcc">incluye tiempo de espera</text>

  <rect x="469" y="390" width="185" height="60" rx="5" fill="#1a1a2e"/>
  <text x="562" y="412" text-anchor="middle" font-size="11" font-weight="bold" fill="#0052CC">Cycle Time</text>
  <text x="562" y="430" text-anchor="middle" font-size="9" fill="#aabbcc">Desde inicio del trabajo</text>
  <text x="562" y="444" text-anchor="middle" font-size="9" fill="#aabbcc">hasta entrega</text>

  <rect x="676" y="390" width="185" height="60" rx="5" fill="#1a1a2e"/>
  <text x="769" y="412" text-anchor="middle" font-size="11" font-weight="bold" fill="#aabbcc">Burndown</text>
  <text x="769" y="430" text-anchor="middle" font-size="9" fill="#aabbcc">Pts pendientes por día</text>
  <text x="769" y="444" text-anchor="middle" font-size="9" fill="#aabbcc">en el Sprint</text>

  <defs>
    <marker id="ltarrow" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#aabbcc"/>
    </marker>
    <marker id="ltarrow2" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto-start-reverse">
      <path d="M0,0 L6,3 L0,6 Z" fill="#aabbcc"/>
    </marker>
  </defs>
</svg>
