<svg viewBox="0 0 900 520" xmlns="http://www.w3.org/2000/svg" font-family="Inter, Roboto, sans-serif">
  <rect width="900" height="520" fill="#1a1a2e"/>

  <!-- Title -->
  <text x="450" y="38" fill="#e2e8f0" font-size="20" font-weight="bold" text-anchor="middle">Ciclo del Sprint — 5 Eventos de Scrum</text>

  <!-- SPRINT outer container -->
  <rect x="40" y="60" width="820" height="420" rx="16" fill="none" stroke="#0052CC" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="60" y="85" fill="#0052CC" font-size="13" font-weight="bold">SPRINT (1–4 semanas)</text>

  <!-- Sprint Goal badge -->
  <rect x="620" y="65" width="220" height="34" rx="8" fill="#0052CC" fill-opacity="0.15" stroke="#0052CC" stroke-width="1"/>
  <text x="730" y="87" fill="#93c5fd" font-size="12" text-anchor="middle">Sprint Goal → guía todo el Sprint</text>

  <!-- Event boxes -->
  <!-- 1. Sprint Planning -->
  <rect x="60" y="110" width="175" height="130" rx="12" fill="#16213e" stroke="#0052CC" stroke-width="1.5"/>
  <text x="147" y="135" fill="#93c5fd" font-size="13" font-weight="bold" text-anchor="middle">Sprint Planning</text>
  <rect x="75" y="145" width="145" height="1" fill="#0052CC" fill-opacity="0.4"/>
  <text x="147" y="165" fill="#94a3b8" font-size="11" text-anchor="middle">Timebox: 8 h</text>
  <text x="147" y="182" fill="#94a3b8" font-size="11" text-anchor="middle">Todo el Scrum Team</text>
  <text x="147" y="199" fill="#94a3b8" font-size="11" text-anchor="middle">→ Sprint Backlog</text>
  <text x="147" y="216" fill="#36B37E" font-size="10" text-anchor="middle">¿Qué + Cómo + Por qué?</text>
  <text x="147" y="232" fill="#36B37E" font-size="10" text-anchor="middle">Sprint Goal definido aquí</text>

  <!-- 2. Daily Scrum -->
  <rect x="260" y="110" width="175" height="130" rx="12" fill="#16213e" stroke="#0052CC" stroke-width="1.5"/>
  <text x="347" y="135" fill="#93c5fd" font-size="13" font-weight="bold" text-anchor="middle">Daily Scrum</text>
  <rect x="275" y="145" width="145" height="1" fill="#0052CC" fill-opacity="0.4"/>
  <text x="347" y="165" fill="#94a3b8" font-size="11" text-anchor="middle">Timebox: 15 min</text>
  <text x="347" y="182" fill="#94a3b8" font-size="11" text-anchor="middle">Solo Developers</text>
  <text x="347" y="199" fill="#94a3b8" font-size="11" text-anchor="middle">→ Sprint Backlog</text>
  <text x="347" y="216" fill="#36B37E" font-size="10" text-anchor="middle">Inspección diaria</text>
  <text x="347" y="232" fill="#36B37E" font-size="10" text-anchor="middle">hacia el Sprint Goal</text>

  <!-- Loop arrow for Daily (repeating) -->
  <path d="M 260 155 Q 200 140 215 175 Q 220 195 260 185" fill="none" stroke="#0052CC" stroke-width="1.2" stroke-dasharray="4,3"/>
  <text x="185" y="172" fill="#64748b" font-size="10" text-anchor="middle">×N días</text>

  <!-- 3. Sprint Review -->
  <rect x="460" y="110" width="175" height="130" rx="12" fill="#16213e" stroke="#0052CC" stroke-width="1.5"/>
  <text x="547" y="135" fill="#93c5fd" font-size="13" font-weight="bold" text-anchor="middle">Sprint Review</text>
  <rect x="475" y="145" width="145" height="1" fill="#0052CC" fill-opacity="0.4"/>
  <text x="547" y="165" fill="#94a3b8" font-size="11" text-anchor="middle">Timebox: 4 h</text>
  <text x="547" y="182" fill="#94a3b8" font-size="11" text-anchor="middle">Scrum Team + Stakeholders</text>
  <text x="547" y="199" fill="#94a3b8" font-size="11" text-anchor="middle">→ Incremento</text>
  <text x="547" y="216" fill="#36B37E" font-size="10" text-anchor="middle">Demo + feedback</text>
  <text x="547" y="232" fill="#36B37E" font-size="10" text-anchor="middle">Backlog actualizado</text>

  <!-- 4. Sprint Retrospective -->
  <rect x="660" y="110" width="175" height="130" rx="12" fill="#16213e" stroke="#0052CC" stroke-width="1.5"/>
  <text x="747" y="135" fill="#93c5fd" font-size="13" font-weight="bold" text-anchor="middle">Retrospectiva</text>
  <rect x="675" y="145" width="145" height="1" fill="#0052CC" fill-opacity="0.4"/>
  <text x="747" y="165" fill="#94a3b8" font-size="11" text-anchor="middle">Timebox: 3 h</text>
  <text x="747" y="182" fill="#94a3b8" font-size="11" text-anchor="middle">Todo el Scrum Team</text>
  <text x="747" y="199" fill="#94a3b8" font-size="11" text-anchor="middle">→ Plan de mejora</text>
  <text x="747" y="216" fill="#36B37E" font-size="10" text-anchor="middle">Inspecciona el equipo</text>
  <text x="747" y="232" fill="#36B37E" font-size="10" text-anchor="middle">≥1 acción de mejora</text>

  <!-- Arrows between events -->
  <line x1="235" y1="175" x2="258" y2="175" stroke="#0052CC" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="435" y1="175" x2="458" y2="175" stroke="#0052CC" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="635" y1="175" x2="658" y2="175" stroke="#0052CC" stroke-width="1.5" marker-end="url(#arr)"/>

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#0052CC"/>
    </marker>
    <marker id="arr2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#36B37E"/>
    </marker>
  </defs>

  <!-- Increment result -->
  <rect x="200" y="310" width="500" height="70" rx="12" fill="#16213e" stroke="#36B37E" stroke-width="1.5"/>
  <text x="450" y="337" fill="#4ade80" font-size="13" font-weight="bold" text-anchor="middle">Incremento</text>
  <text x="450" y="357" fill="#94a3b8" font-size="11" text-anchor="middle">Funcionalidad usable + potencialmente entregable al término del Sprint</text>
  <text x="450" y="373" fill="#64748b" font-size="10" text-anchor="middle">Cumple la Definition of Done</text>

  <!-- Arrow from Review to Increment -->
  <line x1="547" y1="240" x2="547" y2="308" stroke="#36B37E" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arr2)"/>

  <!-- Product Backlog (input) -->
  <rect x="60" y="310" width="120" height="60" rx="10" fill="#16213e" stroke="#FF8B00" stroke-width="1.2"/>
  <text x="120" y="336" fill="#FB923C" font-size="12" font-weight="bold" text-anchor="middle">Product</text>
  <text x="120" y="353" fill="#FB923C" font-size="12" font-weight="bold" text-anchor="middle">Backlog</text>
  <text x="120" y="368" fill="#64748b" font-size="10" text-anchor="middle">PO actualiza</text>

  <line x1="148" y1="340" x2="198" y2="340" stroke="#FF8B00" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arr)"/>

  <!-- Next Sprint loop -->
  <rect x="200" y="400" width="500" height="55" rx="10" fill="none" stroke="#0052CC" stroke-width="1" stroke-dasharray="5,4"/>
  <text x="450" y="422" fill="#64748b" font-size="12" text-anchor="middle">Al terminar la Retrospectiva → comienza el siguiente Sprint</text>
  <text x="450" y="443" fill="#64748b" font-size="11" text-anchor="middle">El ciclo se repite hasta que el Product Backlog se vacíe o el producto sea discontinuado</text>

  <!-- Sprint numbers label -->
  <text x="450" y="490" fill="#334155" font-size="10" text-anchor="middle">Sprint 1 → Sprint 2 → Sprint 3 → ... → Sprint N</text>
</svg>
