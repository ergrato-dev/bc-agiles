  <rect x="185" y="160" width="130" height="120" rx="8" fill="#16213e" stroke="#36B37E" stroke-width="1.5"/>
  <text x="250" y="182" font-size="11" font-weight="bold" fill="#36B37E" text-anchor="middle">SPRINT</text>
  <text x="250" y="196" font-size="11" font-weight="bold" fill="#36B37E" text-anchor="middle">PLANNING</text>
  <text x="250" y="210" font-size="9" fill="#8892b0" text-anchor="middle">máx. 4h (Sprint 2 sem.)</text>
  <text x="250" y="228" font-size="9" fill="#ffffff" text-anchor="middle">① Sprint Goal</text>
  <text x="250" y="243" font-size="9" fill="#ffffff" text-anchor="middle">② Selección PBIs</text>
  <text x="250" y="258" font-size="9" fill="#ffffff" text-anchor="middle">③ Plan de tareas</text>

  <!-- Arrow Planning -> Sprint Board -->
  <line x1="315" y1="220" x2="355" y2="220" stroke="#36B37E" stroke-width="2" marker-end="url(#arrow2)"/>

