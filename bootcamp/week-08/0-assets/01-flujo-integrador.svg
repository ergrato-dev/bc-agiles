<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 540" font-family="Inter, Roboto, sans-serif">
  <!-- Background -->
  <rect width="900" height="540" fill="#1a1a2e"/>

  <!-- Title -->
  <text x="450" y="38" font-size="18" font-weight="bold" fill="#ffffff" text-anchor="middle">Sprint Integrador — Flujo Completo</text>
  <text x="450" y="58" font-size="12" fill="#8892b0" text-anchor="middle">Semana 08 · Etapa 0 — De Cero a Héroe en Métodos Ágiles</text>

  <!-- ===== PRODUCT BACKLOG ===== -->
  <rect x="20" y="80" width="130" height="380" rx="8" fill="#16213e" stroke="#0052CC" stroke-width="1.5"/>
