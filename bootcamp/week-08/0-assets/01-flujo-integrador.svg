  <text x="85" y="116" font-size="11" font-weight="bold" fill="#0052CC" text-anchor="middle">BACKLOG</text>
  <text x="85" y="132" font-size="9" fill="#8892b0" text-anchor="middle">(Product Owner)</text>
  <!-- PBI items -->
  <rect x="30" y="145" width="110" height="22" rx="4" fill="#0052CC" opacity="0.8"/>
  <text x="85" y="159" font-size="9" fill="#ffffff" text-anchor="middle">US-001 · Alta</text>
  <rect x="30" y="172" width="110" height="22" rx="4" fill="#0052CC" opacity="0.6"/>
  <text x="85" y="186" font-size="9" fill="#ffffff" text-anchor="middle">US-002 · Alta</text>
  <rect x="30" y="199" width="110" height="22" rx="4" fill="#0052CC" opacity="0.5"/>
  <text x="85" y="213" font-size="9" fill="#ffffff" text-anchor="middle">US-003 · Media</text>
  <rect x="30" y="226" width="110" height="22" rx="4" fill="#16213e" stroke="#0052CC" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="85" y="240" font-size="9" fill="#8892b0" text-anchor="middle">US-004…</text>
  <rect x="30" y="253" width="110" height="22" rx="4" fill="#16213e" stroke="#0052CC" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="85" y="267" font-size="9" fill="#8892b0" text-anchor="middle">US-005…</text>
  <text x="85" y="310" font-size="9" fill="#8892b0" text-anchor="middle">≥8 US</text>
  <text x="85" y="324" font-size="9" fill="#8892b0" text-anchor="middle">priorizadas</text>
  <text x="85" y="338" font-size="9" fill="#8892b0" text-anchor="middle">con MoSCoW</text>

  <!-- Arrow PB -> Planning -->
  <line x1="150" y1="270" x2="185" y2="270" stroke="#0052CC" stroke-width="2" marker-end="url(#arrow)"/>

