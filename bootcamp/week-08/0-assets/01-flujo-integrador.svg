  <rect x="355" y="80" width="350" height="380" rx="8" fill="#16213e" stroke="#0052CC" stroke-width="2"/>
  <text x="530" y="102" font-size="13" font-weight="bold" fill="#ffffff" text-anchor="middle">SPRINT BACKLOG (Tablero)</text>
  <text x="530" y="118" font-size="10" fill="#8892b0" text-anchor="middle">Equipo de Desarrollo</text>

  <!-- Columns -->
  <!-- To Do -->
  <rect x="362" y="128" width="75" height="22" rx="4" fill="#0052CC" opacity="0.3"/>
  <text x="400" y="142" font-size="10" font-weight="bold" fill="#0052CC" text-anchor="middle">To Do</text>
  <rect x="367" y="156" width="65" height="18" rx="3" fill="#0052CC" opacity="0.7"/>
  <text x="400" y="168" font-size="8" fill="#fff" text-anchor="middle">US-001 T1</text>
  <rect x="367" y="178" width="65" height="18" rx="3" fill="#0052CC" opacity="0.7"/>
  <text x="400" y="190" font-size="8" fill="#fff" text-anchor="middle">US-001 T2</text>
  <rect x="367" y="200" width="65" height="18" rx="3" fill="#0052CC" opacity="0.5"/>
  <text x="400" y="212" font-size="8" fill="#fff" text-anchor="middle">US-002 T1</text>

  <!-- In Progress -->
  <rect x="443" y="128" width="75" height="22" rx="4" fill="#FF8B00" opacity="0.3"/>
  <text x="480" y="142" font-size="10" font-weight="bold" fill="#FF8B00" text-anchor="middle">In Progress</text>
  <rect x="448" y="156" width="65" height="18" rx="3" fill="#FF8B00" opacity="0.7"/>
  <text x="480" y="168" font-size="8" fill="#fff" text-anchor="middle">US-001 T3</text>
  <!-- WIP badge -->
  <circle cx="508" cy="148" r="8" fill="#FF8B00"/>
  <text x="508" y="152" font-size="8" font-weight="bold" fill="#fff" text-anchor="middle">1/2</text>

  <!-- Review -->
  <rect x="524" y="128" width="75" height="22" rx="4" fill="#8892b0" opacity="0.3"/>
  <text x="562" y="142" font-size="10" font-weight="bold" fill="#8892b0" text-anchor="middle">Review</text>
  <rect x="529" y="156" width="65" height="18" rx="3" fill="#8892b0" opacity="0.5"/>
  <text x="562" y="168" font-size="8" fill="#fff" text-anchor="middle">US-003 T1</text>

  <!-- Done -->
  <rect x="605" y="128" width="92" height="22" rx="4" fill="#36B37E" opacity="0.3"/>
  <text x="651" y="142" font-size="10" font-weight="bold" fill="#36B37E" text-anchor="middle">Done ✓</text>
  <rect x="610" y="156" width="82" height="18" rx="3" fill="#36B37E" opacity="0.7"/>
  <text x="651" y="168" font-size="8" fill="#fff" text-anchor="middle">US-002 T2  ✓</text>
  <rect x="610" y="178" width="82" height="18" rx="3" fill="#36B37E" opacity="0.5"/>
  <text x="651" y="190" font-size="8" fill="#fff" text-anchor="middle">US-003 T2  ✓</text>

  <!-- Daily Scrum label inside board -->
  <rect x="362" y="260" width="330" height="50" rx="6" fill="#1a1a2e" stroke="#36B37E" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="527" y="280" font-size="10" font-weight="bold" fill="#36B37E" text-anchor="middle">DAILY SCRUM (cada día · 15 min)</text>
  <text x="527" y="296" font-size="9" fill="#8892b0" text-anchor="middle">¿Qué hice? · ¿Qué haré? · ¿Impedimentos?</text>

  <!-- Impediment box -->
  <rect x="362" y="325" width="155" height="40" rx="6" fill="#1a1a2e" stroke="#FF8B00" stroke-width="1.5"/>
  <text x="440" y="341" font-size="9" font-weight="bold" fill="#FF8B00" text-anchor="middle">⚠ Impedimento</text>
  <text x="440" y="357" font-size="8" fill="#8892b0" text-anchor="middle">SM escala fuera del Daily</text>

  <!-- Sprint Goal box -->
  <rect x="530" y="325" width="162" height="40" rx="6" fill="#1a1a2e" stroke="#36B37E" stroke-width="1.5"/>
  <text x="611" y="341" font-size="9" font-weight="bold" fill="#36B37E" text-anchor="middle">Sprint Goal</text>
  <text x="611" y="357" font-size="8" fill="#8892b0" text-anchor="middle">"Para X, el equipo Y"</text>

  <!-- ===== SPRINT REVIEW ===== -->
  <rect x="730" y="100" width="145" height="110" rx="8" fill="#16213e" stroke="#36B37E" stroke-width="1.5"/>
  <text x="803" y="122" font-size="11" font-weight="bold" fill="#36B37E" text-anchor="middle">SPRINT</text>
  <text x="803" y="136" font-size="11" font-weight="bold" fill="#36B37E" text-anchor="middle">REVIEW</text>
  <text x="803" y="150" font-size="9" fill="#8892b0" text-anchor="middle">máx. 2h</text>
  <text x="803" y="168" font-size="9" fill="#ffffff" text-anchor="middle">Demo del Incremento</text>
  <text x="803" y="183" font-size="9" fill="#ffffff" text-anchor="middle">Feedback stakeholders</text>
  <text x="803" y="198" font-size="9" fill="#8892b0" text-anchor="middle">+ Backlog refinado</text>

  <!-- ===== SPRINT RETROSPECTIVE ===== -->
  <rect x="730" y="240" width="145" height="110" rx="8" fill="#16213e" stroke="#FF8B00" stroke-width="1.5"/>
  <text x="803" y="262" font-size="11" font-weight="bold" fill="#FF8B00" text-anchor="middle">SPRINT</text>
  <text x="803" y="276" font-size="11" font-weight="bold" fill="#FF8B00" text-anchor="middle">RETRO</text>
  <text x="803" y="290" font-size="9" fill="#8892b0" text-anchor="middle">máx. 1.5h</text>
  <text x="803" y="308" font-size="9" fill="#ffffff" text-anchor="middle">¿Qué salió bien?</text>
  <text x="803" y="323" font-size="9" fill="#ffffff" text-anchor="middle">¿Qué mejorar?</text>
  <text x="803" y="338" font-size="9" fill="#FF8B00" text-anchor="middle">→ 1 acción concreta</text>

  <!-- Arrow Sprint Board -> Review -->
  <line x1="705" y1="155" x2="730" y2="155" stroke="#36B37E" stroke-width="2" marker-end="url(#arrow2)"/>
  <!-- Arrow Review -> Retro -->
  <line x1="803" y1="210" x2="803" y2="240" stroke="#36B37E" stroke-width="2" marker-end="url(#arrow2)"/>
  <!-- Arrow Retro -> PB (loop) -->
  <path d="M 730 295 Q 680 430 85 430 Q 50 430 50 460" stroke="#8892b0" stroke-width="1.5" stroke-dasharray="5,3" fill="none" marker-end="url(#arrowGray)"/>
  <path d="M 50 460 L 50 460" stroke="#8892b0" stroke-width="0"/>
  <!-- Loop label -->
  <text x="400" y="450" font-size="9" fill="#8892b0" text-anchor="middle">← Siguiente Sprint</text>

  <!-- ===== INCREMENTO badge ===== -->
  <rect x="730" y="380" width="145" height="50" rx="8" fill="#36B37E" opacity="0.15" stroke="#36B37E" stroke-width="1.5"/>
  <text x="803" y="400" font-size="10" font-weight="bold" fill="#36B37E" text-anchor="middle">INCREMENTO</text>
  <text x="803" y="416" font-size="9" fill="#8892b0" text-anchor="middle">Cumple DoD ✓</text>

  <!-- Arrow from Retro area to Incremento -->
  <line x1="803" y1="350" x2="803" y2="380" stroke="#36B37E" stroke-width="1.5" stroke-dasharray="3,2"/>

  <!-- ===== Legend ===== -->
  <rect x="20" y="490" width="860" height="30" rx="4" fill="#16213e" opacity="0.7"/>
  <circle cx="50" cy="505" r="6" fill="#36B37E"/>
  <text x="62" y="509" font-size="9" fill="#8892b0">Evento Scrum</text>
  <circle cx="160" cy="505" r="6" fill="#FF8B00"/>
  <text x="172" y="509" font-size="9" fill="#8892b0">Impedimento / Alerta</text>
  <circle cx="310" cy="505" r="6" fill="#0052CC"/>
  <text x="322" y="509" font-size="9" fill="#8892b0">Product Backlog / WIP</text>
  <line x1="450" y1="505" x2="475" y2="505" stroke="#8892b0" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="485" y="509" font-size="9" fill="#8892b0">Flujo de retorno al siguiente Sprint</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#0052CC"/>
    </marker>
    <marker id="arrow2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#36B37E"/>
    </marker>
    <marker id="arrowGray" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#8892b0"/>
    </marker>
  </defs>
</svg>
