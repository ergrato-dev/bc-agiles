<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 500" font-family="Inter, Roboto, sans-serif">
  <!-- Background -->
  <rect width="880" height="500" fill="#1a1a2e"/>

  <!-- Title -->
  <text x="440" y="36" font-size="17" font-weight="bold" fill="#ffffff" text-anchor="middle">Planning Poker — Mecánica de Estimación</text>
  <text x="440" y="54" font-size="11" fill="#8892b0" text-anchor="middle">Semana 10 · Estimación Ágil</text>

  <!-- ===== STEP 1: PO reads story ===== -->
  <rect x="20" y="75" width="150" height="90" rx="8" fill="#16213e" stroke="#0052CC" stroke-width="1.5"/>
  <text x="95" y="97" font-size="10" font-weight="bold" fill="#0052CC" text-anchor="middle">① PO presenta</text>
  <text x="95" y="113" font-size="9" fill="#8892b0" text-anchor="middle">Lee la User Story</text>
  <text x="95" y="127" font-size="9" fill="#8892b0" text-anchor="middle">y criterios de</text>
  <text x="95" y="141" font-size="9" fill="#8892b0" text-anchor="middle">aceptación</text>
  <text x="95" y="159" font-size="11" fill="#0052CC" text-anchor="middle">📋</text>

  <!-- Arrow -->
  <line x1="170" y1="120" x2="200" y2="120" stroke="#0052CC" stroke-width="1.5" marker-end="url(#ab)"/>

  <!-- ===== STEP 2: Questions ===== -->
  <rect x="200" y="75" width="145" height="90" rx="8" fill="#16213e" stroke="#0052CC" stroke-width="1.5"/>
  <text x="273" y="97" font-size="10" font-weight="bold" fill="#0052CC" text-anchor="middle">② Preguntas</text>
  <text x="273" y="113" font-size="9" fill="#8892b0" text-anchor="middle">Equipo clari-</text>
  <text x="273" y="127" font-size="9" fill="#8892b0" text-anchor="middle">fica dudas</text>
  <text x="273" y="141" font-size="9" fill="#8892b0" text-anchor="middle">máx. 5 min</text>
  <text x="273" y="159" font-size="11" fill="#0052CC" text-anchor="middle">💬</text>

  <!-- Arrow -->
  <line x1="345" y1="120" x2="375" y2="120" stroke="#0052CC" stroke-width="1.5" marker-end="url(#ab)"/>

  <!-- ===== STEP 3: Select card in secret ===== -->
  <rect x="375" y="75" width="145" height="90" rx="8" fill="#16213e" stroke="#36B37E" stroke-width="1.5"/>
  <text x="448" y="97" font-size="10" font-weight="bold" fill="#36B37E" text-anchor="middle">③ Selección</text>
  <text x="448" y="113" font-size="9" fill="#8892b0" text-anchor="middle">Cada developer</text>
  <text x="448" y="127" font-size="9" fill="#8892b0" text-anchor="middle">elige su carta</text>
  <text x="448" y="141" font-size="9" fill="#8892b0" text-anchor="middle">en secreto</text>
  <text x="448" y="159" font-size="11" fill="#36B37E" text-anchor="middle">🃏</text>

  <!-- Arrow -->
  <line x1="520" y1="120" x2="550" y2="120" stroke="#36B37E" stroke-width="1.5" marker-end="url(#ag)"/>

  <!-- ===== STEP 4: Simultaneous reveal ===== -->
  <rect x="550" y="75" width="145" height="90" rx="8" fill="#16213e" stroke="#FF8B00" stroke-width="2"/>
  <text x="623" y="97" font-size="10" font-weight="bold" fill="#FF8B00" text-anchor="middle">④ Revelación</text>
  <text x="623" y="113" font-size="9" fill="#ffffff" text-anchor="middle">SIMULTÁNEA</text>
  <text x="623" y="127" font-size="9" fill="#8892b0" text-anchor="middle">Todos voltean</text>
  <text x="623" y="141" font-size="9" fill="#8892b0" text-anchor="middle">al mismo tiempo</text>
  <text x="623" y="159" font-size="11" fill="#FF8B00" text-anchor="middle">⚡</text>

  <!-- Arrow fork -->
  <line x1="695" y1="120" x2="725" y2="120" stroke="#FF8B00" stroke-width="1.5"/>
  <line x1="725" y1="120" x2="725" y2="80" stroke="#FF8B00" stroke-width="1.5"/>
  <line x1="725" y1="120" x2="725" y2="165" stroke="#FF8B00" stroke-width="1.5"/>
  <line x1="725" y1="80" x2="745" y2="80" stroke="#36B37E" stroke-width="1.5" marker-end="url(#ag)"/>
  <line x1="725" y1="165" x2="745" y2="165" stroke="#FF8B00" stroke-width="1.5" marker-end="url(#ao)"/>

  <!-- CONSENSUS box -->
  <rect x="745" y="55" width="115" height="55" rx="8" fill="#36B37E" opacity="0.15" stroke="#36B37E" stroke-width="1.5"/>
  <text x="803" y="76" font-size="9" font-weight="bold" fill="#36B37E" text-anchor="middle">✓ Consenso</text>
  <text x="803" y="91" font-size="8" fill="#8892b0" text-anchor="middle">Estimación</text>
  <text x="803" y="103" font-size="8" fill="#8892b0" text-anchor="middle">aceptada</text>

  <!-- DIVERGENCE box -->
  <rect x="745" y="140" width="115" height="55" rx="8" fill="#FF8B00" opacity="0.15" stroke="#FF8B00" stroke-width="1.5"/>
  <text x="803" y="161" font-size="9" font-weight="bold" fill="#FF8B00" text-anchor="middle">⚠ Divergencia</text>
  <text x="803" y="177" font-size="8" fill="#8892b0" text-anchor="middle">Los extremos</text>
  <text x="803" y="189" font-size="8" fill="#8892b0" text-anchor="middle">justifican</text>

  <!-- Loop arrow from divergence back to step 3 -->
  <path d="M 745 168 Q 680 230 448 220 Q 380 215 380 168" stroke="#FF8B00" stroke-width="1.2" stroke-dasharray="4,3" fill="none" marker-end="url(#ao)"/>
  <text x="580" y="243" font-size="8" fill="#FF8B00" text-anchor="middle">nueva ronda (máx. 3)</text>

  <!-- ===== FIBONACCI CARDS ===== -->
  <text x="440" y="285" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">Cartas de Planning Poker</text>

  <!-- Card values -->
  <rect x="30" y="300" width="50" height="70" rx="6" fill="#16213e" stroke="#0052CC" stroke-width="1.5"/>
  <text x="55" y="333" font-size="16" font-weight="bold" fill="#0052CC" text-anchor="middle">0</text>
  <text x="55" y="360" font-size="8" fill="#8892b0" text-anchor="middle">Trivial</text>

  <rect x="95" y="300" width="50" height="70" rx="6" fill="#16213e" stroke="#0052CC" stroke-width="1.5"/>
  <text x="120" y="333" font-size="16" font-weight="bold" fill="#0052CC" text-anchor="middle">1</text>
  <text x="120" y="360" font-size="8" fill="#36B37E" text-anchor="middle">Referencia</text>

  <rect x="160" y="300" width="50" height="70" rx="6" fill="#16213e" stroke="#0052CC" stroke-width="1.5"/>
  <text x="185" y="333" font-size="16" font-weight="bold" fill="#0052CC" text-anchor="middle">2</text>

  <rect x="225" y="300" width="50" height="70" rx="6" fill="#16213e" stroke="#0052CC" stroke-width="1.5"/>
  <text x="250" y="333" font-size="16" font-weight="bold" fill="#0052CC" text-anchor="middle">3</text>

  <rect x="290" y="300" width="50" height="70" rx="6" fill="#16213e" stroke="#0052CC" stroke-width="1.5"/>
  <text x="315" y="333" font-size="16" font-weight="bold" fill="#0052CC" text-anchor="middle">5</text>

  <rect x="355" y="300" width="50" height="70" rx="6" fill="#16213e" stroke="#0052CC" stroke-width="1.5"/>
  <text x="380" y="333" font-size="16" font-weight="bold" fill="#0052CC" text-anchor="middle">8</text>

  <rect x="420" y="300" width="50" height="70" rx="6" fill="#16213e" stroke="#0052CC" stroke-width="1.5"/>
  <text x="445" y="333" font-size="16" font-weight="bold" fill="#0052CC" text-anchor="middle">13</text>

  <rect x="485" y="300" width="50" height="70" rx="6" fill="#16213e" stroke="#0052CC" stroke-width="1.5"/>
  <text x="510" y="333" font-size="16" font-weight="bold" fill="#0052CC" text-anchor="middle">21</text>

  <rect x="550" y="300" width="50" height="70" rx="6" fill="#16213e" stroke="#FF8B00" stroke-width="1.5"/>
  <text x="575" y="333" font-size="14" font-weight="bold" fill="#FF8B00" text-anchor="middle">40</text>
  <text x="575" y="358" font-size="7" fill="#FF8B00" text-anchor="middle">Muy grande</text>

  <rect x="615" y="300" width="50" height="70" rx="6" fill="#16213e" stroke="#FF8B00" stroke-width="2"/>
  <text x="640" y="333" font-size="16" font-weight="bold" fill="#FF8B00" text-anchor="middle">?</text>
  <text x="640" y="354" font-size="7" fill="#FF8B00" text-anchor="middle">No entiendo</text>
  <text x="640" y="364" font-size="7" fill="#FF8B00" text-anchor="middle">suficiente</text>

  <rect x="680" y="300" width="50" height="70" rx="6" fill="#16213e" stroke="#FF8B00" stroke-width="2"/>
  <text x="705" y="333" font-size="16" font-weight="bold" fill="#FF8B00" text-anchor="middle">∞</text>
  <text x="705" y="354" font-size="7" fill="#FF8B00" text-anchor="middle">Dividir</text>
  <text x="705" y="364" font-size="7" fill="#FF8B00" text-anchor="middle">la Story</text>

  <!-- ===== T-SHIRT SIZING ===== -->
  <text x="440" y="400" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">T-Shirt Sizing — Alternativa para backlogs extensos</text>

  <rect x="55" y="415" width="90" height="55" rx="8" fill="#16213e" stroke="#8892b0" stroke-width="1.5"/>
  <text x="100" y="438" font-size="14" font-weight="bold" fill="#8892b0" text-anchor="middle">XS</text>
  <text x="100" y="453" font-size="8" fill="#8892b0" text-anchor="middle">1–2 pts</text>
  <text x="100" y="464" font-size="7" fill="#8892b0" text-anchor="middle">Trivial</text>

  <rect x="180" y="415" width="90" height="55" rx="8" fill="#16213e" stroke="#0052CC" stroke-width="1.5"/>
  <text x="225" y="438" font-size="14" font-weight="bold" fill="#0052CC" text-anchor="middle">S</text>
  <text x="225" y="453" font-size="8" fill="#8892b0" text-anchor="middle">3 pts</text>
  <text x="225" y="464" font-size="7" fill="#8892b0" text-anchor="middle">Simple</text>

  <rect x="305" y="415" width="90" height="55" rx="8" fill="#16213e" stroke="#36B37E" stroke-width="1.5"/>
  <text x="350" y="438" font-size="14" font-weight="bold" fill="#36B37E" text-anchor="middle">M</text>
  <text x="350" y="453" font-size="8" fill="#8892b0" text-anchor="middle">5–8 pts</text>
  <text x="350" y="464" font-size="7" fill="#8892b0" text-anchor="middle">Media</text>

  <rect x="430" y="415" width="90" height="55" rx="8" fill="#16213e" stroke="#FF8B00" stroke-width="1.5"/>
  <text x="475" y="438" font-size="14" font-weight="bold" fill="#FF8B00" text-anchor="middle">L</text>
  <text x="475" y="453" font-size="8" fill="#8892b0" text-anchor="middle">13 pts</text>
  <text x="475" y="464" font-size="7" fill="#8892b0" text-anchor="middle">Alta compl.</text>

  <rect x="555" y="415" width="90" height="55" rx="8" fill="#16213e" stroke="#FF8B00" stroke-width="2"/>
  <text x="600" y="438" font-size="14" font-weight="bold" fill="#FF8B00" text-anchor="middle">XL</text>
  <text x="600" y="453" font-size="8" fill="#FF8B00" text-anchor="middle">21+ pts</text>
  <text x="600" y="464" font-size="7" fill="#FF8B00" text-anchor="middle">Dividir</text>

  <!-- Legend -->
  <rect x="20" y="478" width="840" height="15" rx="3" fill="#16213e" opacity="0.5"/>
  <text x="440" y="490" font-size="8" fill="#8892b0" text-anchor="middle">Planning Poker: Sprint Planning/Refinamiento · T-Shirt Sizing: Estimación de backlog inicial o Épicas</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="ab" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#0052CC"/>
    </marker>
    <marker id="ag" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#36B37E"/>
    </marker>
    <marker id="ao" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#FF8B00"/>
    </marker>
  </defs>
</svg>
