<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 480" width="920" height="480" font-family="Inter, Roboto, Open Sans, system-ui, sans-serif">
  <rect width="920" height="480" fill="#1a1a2e"/>
  <text x="460" y="36" text-anchor="middle" font-size="17" font-weight="700" fill="#ffffff">Los 12 Principios del Manifiesto Ágil</text>

  <!-- Grupo A -->
  <rect x="30" y="56" width="200" height="170" rx="8" fill="#16213e" stroke="#0052CC" stroke-width="1.5"/>
  <text x="130" y="78" text-anchor="middle" font-size="12" font-weight="700" fill="#90cdf4">A — Valor continuo</text>
  <text x="44" y="102" font-size="11" fill="#e2e8f0">P1 Satisfacer al cliente</text>
  <text x="44" y="102" font-size="11" fill="#e2e8f0">P1 Satisfacer al cliente</text>
  <text x="44" y="122" font-size="11" fill="#e2e8f0">P1 Satisfacer al cliente</text>
  <text x="44" y="142" font-size="11" fill="#e2e8f0">P2 Aceptar el cambio</text>
  <text x="44" y="162" font-size="11" fill="#e2e8f0">P3 Entregas frecuentes</text>
  <text x="44" y="102" font-size="11" fill="#e2e8f0">P1 Satisfacer al cliente</text>

  <!-- Rewriting cleanly -->
  <rect x="30" y="56" width="200" height="150" rx="8" fill="#16213e" stroke="#0052CC" stroke-width="1.5"/>
  <text x="130" y="78" text-anchor="middle" font-size="12" font-weight="700" fill="#90cdf4">A — Valor continuo</text>
  <text x="44" y="102" font-size="11" fill="#cbd5e0">P1 · Satisfacer al cliente</text>
  <text x="44" y="122" font-size="11" fill="#cbd5e0">P2 · Aceptar el cambio</text>
  <text x="44" y="142" font-size="11" fill="#cbd5e0">P3 · Entregas frecuentes</text>

  <!-- Grupo B -->
  <rect x="250" y="56" width="200" height="150" rx="8" fill="#16213e" stroke="#0052CC" stroke-width="1.5"/>
  <text x="350" y="78" text-anchor="middle" font-size="12" font-weight="700" fill="#90cdf4">B — Colaboración</text>
  <text x="264" y="102" font-size="11" fill="#cbd5e0">P4 · Negocio + devs juntos</text>
  <text x="264" y="122" font-size="11" fill="#cbd5e0">P5 · Individuos motivados</text>
  <text x="264" y="142" font-size="11" fill="#cbd5e0">P6 · Conversación directa</text>

  <!-- Grupo C -->
  <rect x="470" y="56" width="200" height="190" rx="8" fill="#16213e" stroke="#0052CC" stroke-width="1.5"/>
  <text x="570" y="78" text-anchor="middle" font-size="12" font-weight="700" fill="#90cdf4">C — Excelencia técnica</text>
  <text x="484" y="102" font-size="11" fill="#cbd5e0">P7 · SW funcionando = progreso</text>
  <text x="484" y="122" font-size="11" fill="#cbd5e0">P8 · Ritmo sostenible</text>
  <text x="484" y="142" font-size="11" fill="#cbd5e0">P9 · Excelencia + buen diseño</text>
  <text x="484" y="162" font-size="11" fill="#cbd5e0">P10 · Simplicidad (no hacer de más)</text>

  <!-- Grupo D -->
  <rect x="690" y="56" width="200" height="150" rx="8" fill="#16213e" stroke="#0052CC" stroke-width="1.5"/>
  <text x="790" y="78" text-anchor="middle" font-size="12" font-weight="700" fill="#90cdf4">D — Equipo y mejora</text>
  <text x="704" y="102" font-size="11" fill="#cbd5e0">P11 · Equipos autoorganizados</text>
  <text x="704" y="122" font-size="11" fill="#cbd5e0">P12 · Reflexión y ajuste</text>

  <!-- Conexión al Sprint -->
  <rect x="30" y="240" width="860" height="220" rx="8" fill="#0d1b2a" stroke="#2d3748" stroke-width="1"/>
  <text x="460" y="264" text-anchor="middle" font-size="13" font-weight="600" fill="#a0aec0">Conexión con Scrum</text>

  <!-- P1 → Incremento -->
  <rect x="50" y="278" width="170" height="50" rx="6" fill="#16213e" stroke="#36B37E" stroke-width="1.2"/>
  <text x="135" y="298" text-anchor="middle" font-size="11" font-weight="600" fill="#9ae6b4">P1 + P3</text>
  <text x="135" y="316" text-anchor="middle" font-size="11" fill="#e2e8f0">Incremento por Sprint</text>

  <!-- P4+P6 → Daily -->
  <rect x="240" y="278" width="170" height="50" rx="6" fill="#16213e" stroke="#36B37E" stroke-width="1.2"/>
  <text x="325" y="298" text-anchor="middle" font-size="11" font-weight="600" fill="#9ae6b4">P4 + P6</text>
  <text x="325" y="316" text-anchor="middle" font-size="11" fill="#e2e8f0">Daily Scrum</text>

  <!-- P9+P10 → DoD -->
  <rect x="430" y="278" width="170" height="50" rx="6" fill="#16213e" stroke="#36B37E" stroke-width="1.2"/>
  <text x="515" y="298" text-anchor="middle" font-size="11" font-weight="600" fill="#9ae6b4">P9 + P10</text>
  <text x="515" y="316" text-anchor="middle" font-size="11" fill="#e2e8f0">Definition of Done</text>

  <!-- P12 → Retro -->
  <rect x="620" y="278" width="170" height="50" rx="6" fill="#16213e" stroke="#36B37E" stroke-width="1.2"/>
  <text x="705" y="298" text-anchor="middle" font-size="11" font-weight="600" fill="#9ae6b4">P12</text>
  <text x="705" y="316" text-anchor="middle" font-size="11" fill="#e2e8f0">Sprint Retrospective</text>

  <!-- P8 → Velocity -->
  <rect x="240" y="348" width="440" height="50" rx="6" fill="#16213e" stroke="#FF8B00" stroke-width="1.2"/>
  <text x="460" y="368" text-anchor="middle" font-size="11" font-weight="600" fill="#fbd38d">P8 — Ritmo sostenible</text>
  <text x="460" y="386" text-anchor="middle" font-size="11" fill="#e2e8f0">Velocity estable > sprints de crunch</text>

  <!-- P11 → autoorganización -->
  <rect x="50" y="348" width="170" height="50" rx="6" fill="#16213e" stroke="#FF8B00" stroke-width="1.2"/>
  <text x="135" y="368" text-anchor="middle" font-size="11" font-weight="600" fill="#fbd38d">P11</text>
  <text x="135" y="386" text-anchor="middle" font-size="11" fill="#e2e8f0">Equipo Scrum = autoorg.</text>

  <!-- P11 → autoorganización -->
  <rect x="700" y="348" width="170" height="50" rx="6" fill="#16213e" stroke="#FF8B00" stroke-width="1.2"/>
  <text x="785" y="368" text-anchor="middle" font-size="11" font-weight="600" fill="#fbd38d">P2</text>
  <text x="785" y="386" text-anchor="middle" font-size="11" fill="#e2e8f0">Product Backlog vivo</text>

  <!-- P5 → motivación -->
  <rect x="50" y="418" width="820" height="26" rx="6" fill="#1c2a3a" stroke="#2d3748" stroke-width="1"/>
  <text x="460" y="436" text-anchor="middle" font-size="11" fill="#718096">P5 · Las personas motivadas son el fundamento de todo framework ágil</text>

</svg>
